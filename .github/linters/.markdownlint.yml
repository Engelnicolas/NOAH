---
# Markdownlint configuration for NOAH project
# Simplified configuration to ensure CI compatibility
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
# Default configuration
default: true
# Rule overrides - only essential rules
rules:
  # Line length - Allow reasonable line lengths for documentation
  MD013:
    line_length: 120
    tables: false
    code_blocks: false
  # Unordered list style - Use consistent dashes
  MD004:
    style: "dash"
  # Inline HTML - Allow common HTML elements for documentation
  MD033:
    allowed_elements:
      - "br"
      - "sup"
      - "sub"
      - "kbd"
      - "details"
      - "summary"
      - "img"
      - "a"
      - "div"
  # Bare URL used - Allow bare URLs in documentation
  MD034: false
  # Emphasis used instead of a heading - Allow emphasis for important text
  MD036: false
  # Multiple top-level headings in the same document - Allow multiple H1s
  MD025: false
  # First line in a file should be a top-level heading - Not required
  MD041: false
  # Trailing punctuation in heading - Standard punctuation rules
  MD026:
    punctuation: ".,;:!?"
