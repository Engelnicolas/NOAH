---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f script/requirements.txt ]; then
            pip install -r script/requirements.txt
          fi

      - name: Verify Ansible configuration
        run: |
          echo "Verifying Ansible setup..."
          ansible --version
          echo "Checking Ansible configuration..."
          cd ansible
          ansible-config dump --only-changed
          echo "Verifying kubespray submodule..."
          ls -la kubespray/ | head -5

      - name: Test NOAH CLI
        run: |
          python3 noah.py --version
          python3 noah.py --help

      - name: Install Ansible collections
        run: |
          echo "Installing Ansible collections..."
          ansible-galaxy collection install -r ansible/requirements.yml --force
          
          # Ensure critical collections for CI testing
          ansible-galaxy collection install kubernetes.core --force
          ansible-galaxy collection install community.general --force

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.13.2'

      - name: Update Helm dependencies
        run: |
          echo "Updating Helm chart dependencies..."
          for chart in helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Updating dependencies for $chart"
              # Check if chart has dependencies
              if grep -q "dependencies:" "$chart/Chart.yaml"; then
                helm dependency update "$chart"
              else
                echo "No dependencies found for $chart"
              fi
            fi
          done

      - name: Validate Helm charts
        run: |
          echo "Validating Helm charts..."
          for chart in helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart"
              helm lint "$chart" --strict
            fi
          done

      - name: Lint GitHub Actions workflows
        run: |
          echo "Validating GitHub Actions workflows..."
          .github/workflows/actionlint

      - name: Validate YAML syntax
        run: |
          echo "Validating YAML files..."
          python -c "
          import sys, yaml, os
          errors = 0
          # Exclude directories containing Jinja2 templates or other non-standard YAML
          excluded_dirs = ['.git', 'node_modules', 'ansible/templates', 'ansible/vars']
          for root, dirs, files in os.walk('.'):
              # Prune traversal into excluded directories
              dirs[:] = [d for d in dirs if os.path.join(root, d) not in excluded_dirs]
              
              for file in files:
                  if file.endswith(('.yml', '.yaml')):
                      filepath = os.path.join(root, file)
                      # Skip Helm template files as they contain Go template syntax
                      if '/templates/' in filepath and '/helm/' in filepath:
                          print(f'⚡ {filepath} (Helm template - skipped)')
                          continue
                      try:
                          with open(filepath, 'r') as f:
                              content = f.read()
                              # Handle multi-document YAML files (separated by ---)
                              if '---' in content and content.count('---') > 1:
                                  # Multi-document YAML - use safe_load_all
                                  docs = list(yaml.safe_load_all(content))
                                  if not docs or all(doc is None for doc in docs):
                                      raise yaml.YAMLError('Empty or invalid YAML documents')
                              else:
                                  # Single document YAML - use safe_load  
                                  yaml.safe_load(content)
                          print(f'✓ {filepath}')
                      except Exception as e:
                          print(f'✗ {filepath}: {e}')
                          errors += 1
          
          if errors > 0:
              sys.exit(1)
          print(f'All YAML files that could be parsed are valid!')
          "
