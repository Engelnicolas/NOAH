---
name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install ansible ansible-lint yamllint
          # Install Helm 3.13.3 to match other workflows
          curl -fsSL -o get_helm.sh \
            https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh --version v3.13.3

      - name: Lint YAML
        run: |
          echo "Linting YAML files (standard mode)..."
          # Use custom yamllint config that properly excludes Helm templates
          yamllint --config-file=Script/.yamllint.yml . || {
            echo "⚠️ YAML linting found issues, but continuing in standard mode"
            echo "Check the output above for warnings"
          }

      - name: Lint Ansible
        run: |
          echo "Linting Ansible playbooks (standard mode)..."
          cd Ansible
          ansible-lint main.yml || {
            echo "⚠️ Ansible linting found issues, but continuing in standard mode"
          }
          ansible-playbook --syntax-check main.yml -i inventory || {
            echo "⚠️ Ansible syntax check found issues, but continuing in standard mode"
          }

      - name: Lint Helm Charts
        run: |
          echo "Linting Helm charts (standard mode)..."
          failed_charts=()
          warning_charts=()

          for chart in Helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Linting chart: $chart_name"

              if helm lint "$chart" 2>&1 | tee /tmp/lint_output; then
                if grep -q "WARNING" /tmp/lint_output; then
                  warning_charts+=("$chart_name")
                fi
              else
                if grep -q "ERROR" /tmp/lint_output; then
                  failed_charts+=("$chart_name")
                else
                  warning_charts+=("$chart_name")
                fi
              fi
            fi
          done

          if [ ${#warning_charts[@]} -ne 0 ]; then
            echo "⚠️ Charts with warnings: ${warning_charts[*]}"
          fi

          if [ ${#failed_charts[@]} -ne 0 ]; then
            echo "❌ Charts with critical errors: ${failed_charts[*]}"
            exit 1
          fi

          echo "✅ Helm chart linting completed"

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Run validation scripts
        run: |
          echo "Running validation scripts (standard mode)..."
          chmod +x Script/noah-validate
          ./Script/noah-validate || {
            echo "⚠️ Validation scripts found issues, but continuing in standard mode"
            echo "Check the output above for details"
          }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run security scan
        uses: super-linter/super-linter@v6
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_YAML: true
          VALIDATE_BASH: true
          VALIDATE_ANSIBLE: true
