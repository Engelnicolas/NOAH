---
name: Dependencies

"on":
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Helm Chart Dependencies
        run: |
          echo "## Helm Chart Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "| Chart | Version | App Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|-------------|" >> $GITHUB_STEP_SUMMARY
          
          chart_count=0
          for chart in Helm/*/Chart.yaml; do
            if [ -f "$chart" ]; then
              chart_count=$((chart_count + 1))
              chart_name=$(basename "$(dirname "$chart")")
              version=$(grep "^version:" "$chart" | cut -d' ' -f2)
              app_version=$(grep "^appVersion:" "$chart" | cut -d' ' -f2 || echo "N/A")
              echo "| $chart_name | $version | $app_version |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "✅ Processed $chart_count charts"

      - name: Check Python Dependencies
        run: |
          echo "## Python Dependencies" >> $GITHUB_STEP_SUMMARY
          req_files=$(find . -name "requirements*.txt" | wc -l)
          
          if [ $req_files -eq 0 ]; then
            echo "⚠️ No Python requirements files found" >> $GITHUB_STEP_SUMMARY
          else
            echo "Found $req_files requirements files:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            find . -name "requirements*.txt" -exec echo "📄 {}" \; -exec cat {} \; >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Security Audit
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          
          # Check for potential password fields in YAML files
          password_count=$(grep -r "password.*:" . --include="*.yml" --include="*.yaml" | wc -l)
          if [ $password_count -gt 0 ]; then
            echo "⚠️ Found $password_count potential password fields" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No obvious password fields found" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for hardcoded secrets patterns
          secret_patterns=("api_key" "secret_key" "token" "password" "private_key")
          for pattern in "${secret_patterns[@]}"; do
            count=$(grep -ri "$pattern" . --include="*.yml" --include="*.yaml" --include="*.json" | wc -l)
            if [ $count -gt 0 ]; then
              echo "⚠️ Found $count potential $pattern references" >> $GITHUB_STEP_SUMMARY
            fi
          done \
            --include="*.yaml" 2>/dev/null | wc -l)
          if [ $password_count -gt 0 ]; then
            echo "⚠️ Found $password_count potential password references:"
            grep -r "password.*:" . --include="*.yml" \
              --include="*.yaml" | head -10 || true
          fi

          echo "Checking for potential secret fields..."
          secret_count=$(grep -r "secret.*:" . --include="*.yml" \
            --include="*.yaml" 2>/dev/null | wc -l)
          if [ $secret_count -gt 0 ]; then
            echo "⚠️ Found $secret_count potential secret references:"
            grep -r "secret.*:" . --include="*.yml" \
              --include="*.yaml" | head -10 || true
          fi

          echo "✅ Security audit completed"
