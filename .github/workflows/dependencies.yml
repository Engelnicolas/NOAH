name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 10:00 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-helm-dependencies:
    name: Update Helm Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.12.0'

      - name: Update Helm chart dependencies
        run: |
          updated_charts=()
          
          cd Helm
          for chart in */; do
            if [ -f "${chart}Chart.yaml" ]; then
              echo "Checking dependencies for ${chart}..."
              cd "${chart}"
              
              if [ -f "Chart.yaml" ] && grep -q "dependencies:" Chart.yaml; then
                echo "Updating dependencies for ${chart}..."
                helm dependency update
                if [ $? -eq 0 ]; then
                  updated_charts+=("${chart}")
                fi
              fi
              
              cd ..
            fi
          done
          
          # Export updated charts for later use
          echo "UPDATED_CHARTS=${updated_charts[*]}" >> $GITHUB_ENV

      - name: Create Pull Request
        if: env.UPDATED_CHARTS != ''
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Helm chart dependencies'
          title: 'chore: Update Helm Chart Dependencies'
          body: |
            This PR updates Helm chart dependencies to their latest versions.
            
            **Updated Charts:**
            ${{ env.UPDATED_CHARTS }}
            
            **Changes:**
            - Updated Chart.lock files
            - Updated charts/ directories with latest dependency versions
            
            This is an automated update created by the dependency update workflow.
          branch: update-helm-dependencies
          delete-branch: true

  update-ansible-collections:
    name: Update Ansible Collections
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible>=6.0.0

      - name: Update Ansible collections
        run: |
          cd Ansible
          
          # Backup current requirements
          cp requirements.yml requirements.yml.backup
          
          # Get list of installed collections
          if [ -f requirements.yml ]; then
            echo "Updating Ansible collections..."
            
            # Install current collections
            ansible-galaxy collection install -r requirements.yml
            
            # Update to latest versions (this is a basic approach)
            # In practice, you might want more sophisticated version management
            ansible-galaxy collection list --format yaml > current_collections.yml
            
            # Check if there are any updates available
            # This is a placeholder - actual implementation would check for newer versions
            echo "Collections update check completed"
          fi

      - name: Validate updated collections
        run: |
          cd Ansible
          if [ -f requirements.yml ]; then
            echo "Validating Ansible playbooks with updated collections..."
            ansible-playbook --syntax-check main.yml
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Ansible collections'
          title: 'chore: Update Ansible Collections'
          body: |
            This PR updates Ansible collections to their latest compatible versions.
            
            **Changes:**
            - Updated requirements.yml with latest collection versions
            - Validated playbook syntax with updated collections
            
            This is an automated update created by the dependency update workflow.
            
            Please review the changes and test in a development environment before merging.
          branch: update-ansible-collections
          delete-branch: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'

      - name: Run Snyk security scan
        uses: snyk/actions/setup@master
      
      - name: Snyk scan
        run: snyk test --all-projects || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  check-tool-versions:
    name: Check Tool Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for newer tool versions
        run: |
          echo "Checking for newer versions of tools..."
          
          # Check Helm version
          CURRENT_HELM=$(grep -o "HELM_VERSION: 'v[0-9.]*'" .github/workflows/*.yml | head -1 | cut -d"'" -f2)
          LATEST_HELM=$(curl -s https://api.github.com/repos/helm/helm/releases/latest | grep -o '"tag_name": "v[0-9.]*"' | cut -d'"' -f4)
          
          echo "Current Helm version: $CURRENT_HELM"
          echo "Latest Helm version: $LATEST_HELM"
          
          # Check kubectl version
          CURRENT_KUBECTL=$(grep -o "KUBECTL_VERSION: 'v[0-9.]*'" .github/workflows/*.yml | head -1 | cut -d"'" -f2)
          LATEST_KUBECTL=$(curl -s https://api.github.com/repos/kubernetes/kubernetes/releases/latest | grep -o '"tag_name": "v[0-9.]*"' | cut -d'"' -f4)
          
          echo "Current kubectl version: $CURRENT_KUBECTL"
          echo "Latest kubectl version: $LATEST_KUBECTL"
          
          # Create issue if versions are outdated
          if [ "$CURRENT_HELM" != "$LATEST_HELM" ] || [ "$CURRENT_KUBECTL" != "$LATEST_KUBECTL" ]; then
            echo "Tool versions need updating"
            echo "TOOLS_OUTDATED=true" >> $GITHUB_ENV
            echo "HELM_UPDATE=$CURRENT_HELM -> $LATEST_HELM" >> $GITHUB_ENV
            echo "KUBECTL_UPDATE=$CURRENT_KUBECTL -> $LATEST_KUBECTL" >> $GITHUB_ENV
          fi

      - name: Create issue for tool updates
        if: env.TOOLS_OUTDATED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Tool versions need updating';
            const body = `
            The following tools have newer versions available:
            
            **Helm:** ${{ env.HELM_UPDATE }}
            **kubectl:** ${{ env.KUBECTL_UPDATE }}
            
            Please consider updating the tool versions in the GitHub Actions workflows.
            
            This issue was automatically created by the dependency update workflow.
            `;
            
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['dependencies', 'tools']
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'tools', 'enhancement']
              });
            }

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [update-helm-dependencies, update-ansible-collections, security-scan, check-tool-versions]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results:" >> $GITHUB_STEP_SUMMARY
          echo "- Helm Dependencies: ${{ needs.update-helm-dependencies.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ansible Collections: ${{ needs.update-ansible-collections.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tool Version Check: ${{ needs.check-tool-versions.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the individual job logs for details and any created pull requests."
