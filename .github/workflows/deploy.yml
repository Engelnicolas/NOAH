name: Deploy NOAH to Kubernetes

on:
  push:
    branches: [ main, Ansible ]
  workflow_dispatch:  # Permet le déclenchement manuel

env:
  ANSIBLE_HOST_KEY_CHECKING: False
  ANSIBLE_STDOUT_CALLBACK: yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Pour récupérer Kubespray

      - name: Set up Python & Ansible
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Ansible & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-core netaddr jinja2
          ansible-galaxy collection install community.kubernetes
          ansible-galaxy collection install kubernetes.core
          ansible-galaxy collection install cloud.common

      - name: Configure SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.MASTER_HOST }} >> ~/.ssh/known_hosts

      - name: Verify Ansible installation
        run: |
          ansible --version
          ansible-playbook --version

      - name: Provision infrastructure
        run: |
          cd ansible
          ansible-playbook playbooks/01-provision.yml -i inventory/mycluster/hosts.yaml -v
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Install Kubernetes via Kubespray
        run: |
          cd ansible
          ansible-playbook playbooks/02-install-k8s.yml -i inventory/mycluster/hosts.yaml -v
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Configure Kubernetes cluster
        run: |
          cd ansible
          ansible-playbook playbooks/03-configure-cluster.yml -i inventory/mycluster/hosts.yaml -v
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Deploy NOAH application via Helm
        run: |
          cd ansible
          ansible-playbook playbooks/04-deploy-apps.yml -i inventory/mycluster/hosts.yaml -v
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Verify deployment
        run: |
          cd ansible
          ansible-playbook playbooks/05-verify-deployment.yml -i inventory/mycluster/hosts.yaml -v

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "Deployment failed, running cleanup..."
          cd ansible
          ansible-playbook playbooks/99-cleanup.yml -i inventory/mycluster/hosts.yaml -v || true
