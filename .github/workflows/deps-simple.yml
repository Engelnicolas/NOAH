name: Dependencies

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for outdated dependencies
        run: |
          echo "Checking Helm chart dependencies..."
          for chart in Helm/*/Chart.yaml; do
            if [ -f "$chart" ]; then
              echo "Chart: $chart"
              grep -E "version:|appVersion:" "$chart" || true
            fi
          done
          
      - name: Check Python dependencies
        run: |
          echo "Checking Python requirements..."
          find . -name "requirements*.txt" -exec cat {} \; || echo "No Python requirements found"
          
      - name: Security audit
        run: |
          echo "Running basic security checks..."
          # Check for common security issues in YAML files
          grep -r "password.*:" . --include="*.yml" --include="*.yaml" | head -10 || true
          grep -r "secret.*:" . --include="*.yml" --include="*.yaml" | head -10 || true
