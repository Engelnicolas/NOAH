---
name: Documentation
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material
      - name: Build Documentation
        run: |
          mkdocs build || echo "Warning: Documentation build had issues"
