---
name: Release

"on":
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          echo "Generating changelog (standard mode)..."
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || \
            echo "")
          if [ -n "$LAST_TAG" ]; then
            git log --pretty=format:"- %s" "$LAST_TAG"..HEAD > CHANGELOG.md
          else
            echo "⚠️ No previous tag found, generating from initial commit"
            git log --pretty=format:"- %s" > CHANGELOG.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Helm/**/*.tgz
            Script/*.sh
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm charts
        run: |
          echo "Packaging Helm charts (standard mode)..."
          mkdir -p releases
          failed_charts=()

          for chart in Helm/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              chart_name=$(basename "$chart")
              echo "Packaging chart: $chart_name"

              if ! helm package "$chart" -d releases/; then
                failed_charts+=("$chart_name")
                echo "⚠️ Failed to package $chart_name, but continuing..."
              fi
            fi
          done

          if [ ${#failed_charts[@]} -ne 0 ]; then
            echo "⚠️ The following charts failed to package:"
            printf '%s\n' "${failed_charts[@]}"
            echo "Continuing with successfully packaged charts..."
          fi

          # Check if at least one chart was packaged successfully
          if [ -z "$(ls -A releases/ 2>/dev/null)" ]; then
            echo "❌ No charts were successfully packaged"
            exit 1
          fi

      - name: Upload Helm packages
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
