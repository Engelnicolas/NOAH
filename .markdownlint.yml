# Markdown Linting Configuration for NOAH

extends: default
rules:
  line-length:
    line_length: 100
    code_blocks: false
    tables: false
    headings: false
  heading-style:
    style: atx
  ul-style:
    style: dash
  no-inline-html:
    allowed_elements:
    - br
    - sub
    - sup
    - b
    - i
    - strong
    - em
    - code
    - pre
    - details
    - summary
  no-trailing-spaces: true
  no-multiple-blanks: true
  no-bare-urls: false
  no-duplicate-heading:
    siblings_only: true
