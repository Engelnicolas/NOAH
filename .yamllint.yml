# NOAH YAML Linting Configuration
# ================================
# This configuration balances code quality with practicality

extends: default

rules:
  # Allow longer lines for Ansible tasks with long module names or URLs
  line-length:
    max: 140
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true

  # Allow trailing spaces in some cases (like Jinja2 templates)
  trailing-spaces:
    level: warning

  # Document start is optional for most files  
  document-start: disable

  # Allow empty values
  empty-values:
    forbid-in-block-mappings: false
    forbid-in-flow-mappings: false

  # Allow some truthy variations common in Ansible
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  # Relax indentation rules for complex nested structures
  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false

  # Allow comments at the end of lines
  comments:
    min-spaces-from-content: 1

  # Octal values are common in file permissions
  octal-values:
    forbid-implicit-octal: false
    forbid-explicit-octal: false

  # Brackets spacing for readability
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  # Braces spacing for Helm templates
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  # Ignore Helm template files as they contain Go templating syntax
  Helm/*/templates/*.yaml
  Helm/*/templates/*.yml
  
  # Ignore generated or external files
  */Chart.lock
  */requirements.lock
