# YAML Linting Configuration for NOAH

extends: default
rules:
  line-length:
    max: 120
    level: warning
  indentation:
    spaces: 2
  comments:
    min-spaces-from-content: 1
  trailing-spaces: enable
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
  document-start: disable
  document-end: disable
  truthy:
    allowed-values:
    - 'true'
    - 'false'
    - 'yes'
    - 'no'
    check-keys: false
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  colons:
    max-spaces-before: 0
    max-spaces-after: 1
  commas:
    max-spaces-before: 0
    max-spaces-after: 1
  hyphens:
    max-spaces-after: 1
  key-duplicates: enable
  new-line-at-end-of-file: enable
  octal-values: disable
