[defaults]
# Basic configuration
inventory = inventory
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = memory
fact_caching_timeout = 86400

# Output configuration
stdout_callback = yaml
display_skipped_hosts = False
display_ok_hosts = True
display_failed_stderr = True

# Logging
log_path = /tmp/ansible-openinfra.log

# Performance tuning
forks = 10
pipelining = True
host_key_checking = False

# Privilege escalation
become_ask_pass = False

# Connection settings
timeout = 30
remote_user = root

[inventory]
enable_plugins = kubernetes.core.k8s

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[kubernetes.core.k8s]
connections = kubectl

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
