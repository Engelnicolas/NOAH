---
# Ansible/roles/monitoring/tasks/main.yml
# Deploy Prometheus and Grafana monitoring stack

- name: Deploy Prometheus using Helm
  kubernetes.core.helm:
    name: prometheus
    chart_ref: "{{ playbook_dir }}/../Helm/prometheus"
    release_namespace: "{{ namespace }}"
    create_namespace: false
    values:
      server:
        replicaCount: 1
        image:
          repository: prom/prometheus
          tag: v2.45.0
        
        persistentVolume:
          enabled: true
          size: 20Gi
          storageClass: ""
          
        retention: "30d"
        
        service:
          type: ClusterIP
          port: 9090
          
        ingress:
          enabled: true
          hostname: prometheus.local
          
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
            
        # Scrape configurations
        scrapeConfigs:
          - job_name: 'kubernetes-apiservers'
            kubernetes_sd_configs:
              - role: endpoints
            scheme: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            relabel_configs:
              - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                action: keep
                regex: default;kubernetes;https
                
          - job_name: 'kubernetes-nodes'
            kubernetes_sd_configs:
              - role: node
            scheme: https
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)
                
          - job_name: 'kubernetes-pods'
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
                
          - job_name: 'openinfra-services'
            static_configs:
              - targets:
                - 'keycloak:8080'
                - 'nextcloud:80'
                - 'mattermost:8065'
                - 'gitlab:80'
                - 'samba4:389'
                - 'wazuh:1514'
                - 'openedr:8080'
            scrape_interval: 30s
            metrics_path: '/metrics'
            
      alertmanager:
        enabled: true
        replicaCount: 1
        
        config:
          global:
            smtp_smarthost: 'localhost:587'
            smtp_from: 'alerts@openinfra.local'
          route:
            group_by: ['alertname']
            group_wait: 10s
            group_interval: 10s
            repeat_interval: 1h
            receiver: 'web.hook'
          receivers:
          - name: 'web.hook'
            webhook_configs:
            - url: 'http://webhook.local:5000/alerts'
              
        service:
          type: ClusterIP
          port: 9093
  register: prometheus_deployment

- name: Deploy Grafana using Helm
  kubernetes.core.helm:
    name: grafana
    chart_ref: "{{ playbook_dir }}/../Helm/grafana"
    release_namespace: "{{ namespace }}"
    create_namespace: false
    values:
      replicaCount: 1
      image:
        repository: grafana/grafana
        tag: "10.1.0"
        
      admin:
        user: admin
        password: "{{ grafana_admin_password | default('changeme123') }}"
        
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ""
        
      service:
        type: ClusterIP
        port: 3000
        
      ingress:
        enabled: true
        hostname: grafana.local
        
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus:9090
            access: proxy
            isDefault: true
            
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
          - name: 'default'
            orgId: 1
            folder: ''
            folderUid: ''
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards/default
              
      dashboards:
        default:
          kubernetes-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          kubernetes-pods:
            gnetId: 6417
            revision: 1
            datasource: Prometheus
          node-exporter:
            gnetId: 1860
            revision: 27
            datasource: Prometheus
          openinfra-overview:
            json: |
              {
                "dashboard": {
                  "title": "OpenInfra Services Overview",
                  "panels": [
                    {
                      "title": "Service Status",
                      "type": "stat",
                      "targets": [
                        {
                          "expr": "up{job=\"openinfra-services\"}",
                          "legendFormat": "{{instance}}"
                        }
                      ]
                    },
                    {
                      "title": "HTTP Requests Rate",
                      "type": "graph",
                      "targets": [
                        {
                          "expr": "rate(http_requests_total[5m])",
                          "legendFormat": "{{service}}"
                        }
                      ]
                    }
                  ]
                }
              }
              
      ldap:
        enabled: true
        config: |
          [[servers]]
          host = "{{ ldap_url.split('://')[1] }}"
          port = 389
          use_ssl = false
          start_tls = false
          ssl_skip_verify = false
          bind_dn = "cn=grafana-ldap,OU=Services,{{ ldap_base_dn }}"
          bind_password = "{{ grafana_ldap_password | default('changeme123') }}"
          search_filter = "(sAMAccountName=%s)"
          search_base_dns = ["OU=Users,{{ ldap_base_dn }}"]
          
          [servers.attributes]
          name = "givenName"
          surname = "sn"
          username = "sAMAccountName"
          member_of = "memberOf"
          email = "mail"
          
          [[servers.group_mappings]]
          group_dn = "cn=AdminUsers,OU=Groups,{{ ldap_base_dn }}"
          org_role = "Admin"
          
          [[servers.group_mappings]]
          group_dn = "cn=NextcloudUsers,OU=Groups,{{ ldap_base_dn }}"
          org_role = "Viewer"
          
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 512Mi
  register: grafana_deployment

- name: Deploy Node Exporter DaemonSet
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: node-exporter
        namespace: "{{ namespace }}"
        labels:
          app: node-exporter
      spec:
        selector:
          matchLabels:
            app: node-exporter
        template:
          metadata:
            labels:
              app: node-exporter
          spec:
            hostNetwork: true
            hostPID: true
            containers:
            - name: node-exporter
              image: prom/node-exporter:v1.6.1
              args:
                - '--path.sysfs=/host/sys'
                - '--path.procfs=/host/proc'
                - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
              ports:
              - containerPort: 9100
                protocol: TCP
              resources:
                limits:
                  cpu: 200m
                  memory: 200Mi
                requests:
                  cpu: 100m
                  memory: 100Mi
              volumeMounts:
              - name: proc
                mountPath: /host/proc
                readOnly: true
              - name: sys
                mountPath: /host/sys
                readOnly: true
              - name: root
                mountPath: /rootfs
                readOnly: true
            volumes:
            - name: proc
              hostPath:
                path: /proc
            - name: sys
              hostPath:
                path: /sys
            - name: root
              hostPath:
                path: /
            tolerations:
            - operator: Exists
              effect: NoSchedule
  register: node_exporter_deployment

- name: Create Node Exporter Service
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: node-exporter
        namespace: "{{ namespace }}"
        labels:
          app: node-exporter
        annotations:
          prometheus.io/scrape: 'true'
          prometheus.io/port: '9100'
      spec:
        type: ClusterIP
        ports:
        - port: 9100
          protocol: TCP
          targetPort: 9100
        selector:
          app: node-exporter

- name: Wait for Prometheus pod to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - "app=prometheus"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300
  register: prometheus_pods

- name: Wait for Grafana pod to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - "app=grafana"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300
  register: grafana_pods

- name: Wait for Node Exporter pods to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - "app=node-exporter"
    wait: true
    wait_condition:
      type: Ready
      status: "True"
    wait_timeout: 300
  register: node_exporter_pods

- name: Create monitoring targets ConfigMap
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: prometheus-targets
        namespace: "{{ namespace }}"
      data:
        targets.json: |
          [
            {
              "targets": [
                "keycloak.{{ namespace }}.svc.cluster.local:8080",
                "nextcloud.{{ namespace }}.svc.cluster.local:80",
                "mattermost.{{ namespace }}.svc.cluster.local:8065",
                "gitlab.{{ namespace }}.svc.cluster.local:80",
                "samba4.{{ namespace }}.svc.cluster.local:389",
                "wazuh.{{ namespace }}.svc.cluster.local:1514",
                "grafana.{{ namespace }}.svc.cluster.local:3000"
              ],
              "labels": {
                "env": "{{ env | default('production') }}",
                "service": "openinfra"
              }
            }
          ]

- name: Configure Grafana LDAP authentication
  kubernetes.core.k8s_exec:
    namespace: "{{ namespace }}"
    pod: "{{ grafana_pods.resources[0].metadata.name }}"
    command:
      - grafana-cli
      - admin
      - reset-admin-password
      - "{{ grafana_admin_password | default('changeme123') }}"
  register: grafana_password_reset
  failed_when: false

- name: Verify Prometheus health
  uri:
    url: "http://{{ prometheus_pods.resources[0].status.podIP }}:9090/-/healthy"
    method: GET
    status_code: 200
  register: prometheus_health
  until: prometheus_health.status == 200
  retries: 10
  delay: 15

- name: Verify Grafana health
  uri:
    url: "http://{{ grafana_pods.resources[0].status.podIP }}:3000/api/health"
    method: GET
    status_code: 200
  register: grafana_health
  until: grafana_health.status == 200
  retries: 10
  delay: 15

- name: Display monitoring deployment status
  debug:
    msg: |
      Monitoring stack deployment completed:
      
      📊 Prometheus:
      - URL: https://prometheus.local
      - Health: {{ prometheus_health.status == 200 | ternary('Healthy', 'Unhealthy') }}
      - Data Retention: 30 days
      - Storage: 20Gi
      - Pod: {{ prometheus_pods.resources[0].metadata.name }}
      
      📈 Grafana:
      - URL: https://grafana.local
      - Admin User: admin
      - Admin Password: {{ grafana_admin_password | default('changeme123') }}
      - LDAP Auth: Configured
      - Health: {{ grafana_health.status == 200 | ternary('Healthy', 'Unhealthy') }}
      - Pod: {{ grafana_pods.resources[0].metadata.name }}
      
      🖥️  Node Exporter:
      - DaemonSet: Deployed on all nodes
      - Active Pods: {{ node_exporter_pods.resources | length }}
      - Metrics Port: 9100
      
      📋 Dashboards:
      - Kubernetes Cluster Overview
      - Kubernetes Pods
      - Node Exporter Metrics
      - OpenInfra Services Overview
      
      🎯 Monitored Services:
      - Keycloak, Nextcloud, Mattermost
      - GitLab, Samba4, Wazuh
      - Kubernetes components
      
      📝 Next Steps:
      1. Access Grafana at https://grafana.local
      2. Login with admin/{{ grafana_admin_password | default('changeme123') }}
      3. Configure additional dashboards
      4. Set up alerting rules
      5. Configure notification channels
    namespace: openinfra
    label_selectors:
      - "app=grafana"
  register: grafana_pods
  until: grafana_pods.resources[0].status.containerStatuses[0].ready
  retries: 10
  delay: 15

- name: Configure Prometheus scrape targets
  ansible.builtin.copy:
    src: roles/monitoring/targets.yml
    dest: /etc/prometheus/targets.yml
    mode: '0644'

- name: Run post-deployment validation script (optional)
  ansible.builtin.shell: bash Test/post_deploy_validate.sh
  when: run_validation|default(true)
  args:
    chdir: "{{ playbook_dir }}"
  register: validate_output
  ignore_errors: false

- name: Display validation script output
  ansible.builtin.debug:
    var: validate_output.stdout