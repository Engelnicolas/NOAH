# =======================================
# NOAH Secure Deployment Values
# =======================================
# High security configuration for production

# Single replica
replicaCount: 1

# Secure non-root user context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

# Limited resources
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# No persistence (ephemeral for security)
persistence:
  enabled: false

# No external database
postgresql:
  enabled: false

redis:
  enabled: false

# No external access
ingress:
  enabled: false

# No monitoring to reduce attack surface
serviceMonitor:
  enabled: false

# Enable network policies
networkPolicy:
  enabled: true

# No autoscaling
autoscaling:
  enabled: false
