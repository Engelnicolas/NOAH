---
# Wazuh Manager Deployment
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wazuh.manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
spec:
  serviceName: {{ include "wazuh.manager.fullname" . }}-headless
  replicas: {{ .Values.manager.replicaCount }}
  selector:
    matchLabels:
      {{- include "wazuh.manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.manager.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "wazuh.manager.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wazuh-manager
          image: "{{ .Values.manager.image.repository }}:{{ .Values.manager.image.tag }}"
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: agents
              containerPort: 1514
              protocol: TCP
            - name: api
              containerPort: 55000
              protocol: TCP
            - name: cluster
              containerPort: 1516
              protocol: TCP
            - name: auth
              containerPort: 1515
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: WAZUH_MANAGER_SERVICE_NAME
              value: {{ include "wazuh.manager.fullname" . }}
            - name: WAZUH_MANAGER_MASTER
              value: "{{ include "wazuh.manager.fullname" . }}-0.{{ include "wazuh.manager.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local"
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: cluster-key
            - name: WAZUH_API_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: api-username
            - name: WAZUH_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: api-password
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: elasticsearch-password
            - name: LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: ldap-bind-password
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.healthCheck.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: wazuh-manager-master
              mountPath: /var/ossec/api/configuration
              subPath: wazuh/api/configuration
            - name: wazuh-manager-master
              mountPath: /var/ossec/etc
              subPath: wazuh/etc
            - name: wazuh-manager-master
              mountPath: /var/ossec/logs
              subPath: wazuh/logs
            - name: wazuh-manager-master
              mountPath: /var/ossec/queue
              subPath: wazuh/queue
            - name: wazuh-manager-master
              mountPath: /var/ossec/var/multigroups
              subPath: wazuh/var/multigroups
            - name: wazuh-manager-master
              mountPath: /var/ossec/integrations
              subPath: wazuh/integrations
            - name: wazuh-manager-master
              mountPath: /var/ossec/active-response/bin
              subPath: wazuh/active-response/bin
            - name: wazuh-manager-master
              mountPath: /var/ossec/agentless
              subPath: wazuh/agentless
            - name: wazuh-manager-master
              mountPath: /var/ossec/wodles
              subPath: wazuh/wodles
            - name: wazuh-authd-pass
              mountPath: /wazuh-config-mount/etc/authd.pass
              subPath: authd.pass
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- range .Values.extraVolumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "wazuh.fullname" . }}-manager-conf
        - name: wazuh-authd-pass
          secret:
            secretName: {{ include "wazuh.fullname" . }}-authd-pass
        - name: tmp
          emptyDir: {}
        {{- range .Values.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
  {{- if .Values.persistence.manager.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-master
        {{- with .Values.persistence.manager.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- range .Values.persistence.manager.accessModes }}
          - {{ . | quote }}
          {{- end }}
        {{- if .Values.persistence.manager.storageClass }}
        storageClassName: {{ .Values.persistence.manager.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.manager.size | quote }}
  {{- end }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}

---
{{- if .Values.dashboard.enabled }}
# Wazuh Dashboard Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wazuh.dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "wazuh.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.dashboard.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "5601"
        prometheus.io/path: "/api/status"
    spec:
      serviceAccountName: {{ include "wazuh.dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wazuh-dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          env:
            - name: OPENSEARCH_HOSTS
              value: {{ .Values.dashboard.config.opensearch.hosts | join "," | quote }}
            - name: OPENSEARCH_USERNAME
              value: {{ .Values.dashboard.config.opensearch.username | quote }}
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: elasticsearch-password
            - name: WAZUH_API_URL
              value: {{ .Values.dashboard.config.wazuh.api.url | quote }}
            - name: WAZUH_API_PORT
              value: {{ .Values.dashboard.config.wazuh.api.port | quote }}
            - name: WAZUH_API_USERNAME
              value: {{ .Values.dashboard.config.wazuh.api.username | quote }}
            - name: WAZUH_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wazuh.fullname" . }}-secret
                  key: api-password
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: /app/wazuh
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /app/wazuh
              port: http
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
              readOnly: true
            {{- if .Values.persistence.dashboard.enabled }}
            - name: wazuh-dashboard-data
              mountPath: /usr/share/wazuh-dashboard/data
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- range .Values.extraVolumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "wazuh.fullname" . }}-dashboard-conf
        {{- if .Values.persistence.dashboard.enabled }}
        - name: wazuh-dashboard-data
          persistentVolumeClaim:
            claimName: {{ include "wazuh.dashboard.fullname" . }}-data
        {{- end }}
        - name: tmp
          emptyDir: {}
        {{- range .Values.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
{{- end }}

---
{{- if .Values.indexer.enabled }}
# Wazuh Indexer StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wazuh.indexer.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
spec:
  serviceName: {{ include "wazuh.indexer.fullname" . }}-headless
  replicas: {{ .Values.indexer.replicaCount }}
  selector:
    matchLabels:
      {{- include "wazuh.indexer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.indexer.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9200"
        prometheus.io/path: "/_prometheus/metrics"
    spec:
      serviceAccountName: {{ include "wazuh.indexer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wazuh-indexer
          image: "{{ .Values.indexer.image.repository }}:{{ .Values.indexer.image.tag }}"
          imagePullPolicy: {{ .Values.indexer.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          env:
            - name: cluster.name
              value: {{ .Values.indexer.config.cluster.name | quote }}
            - name: network.host
              value: "0.0.0.0"
            - name: discovery.seed_hosts
              value: "{{ include "wazuh.indexer.fullname" . }}-headless"
            - name: cluster.initial_master_nodes
              value: "{{ include "wazuh.indexer.fullname" . }}-0,{{ include "wazuh.indexer.fullname" . }}-1,{{ include "wazuh.indexer.fullname" . }}-2"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.indexer.resources | nindent 12 }}
          volumeMounts:
            - name: wazuh-indexer-data
              mountPath: /var/lib/wazuh-indexer
            - name: config
              mountPath: /usr/share/wazuh-indexer/opensearch.yml
              subPath: opensearch.yml
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- range .Values.extraVolumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "wazuh.fullname" . }}-indexer-conf
        - name: tmp
          emptyDir: {}
        {{- range .Values.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.indexer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.indexer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.indexer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
  {{- if .Values.indexer.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: wazuh-indexer-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.indexer.persistence.storageClass }}
        storageClassName: {{ .Values.indexer.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.indexer.persistence.size | quote }}
  {{- end }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
{{- end }}

---
{{- if .Values.agent.enabled }}
# Wazuh Agent DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "wazuh.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wazuh.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
spec:
  selector:
    matchLabels:
      {{- include "wazuh.agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wazuh.agent.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "wazuh.agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      hostNetwork: true
      hostPID: true
      containers:
        - name: wazuh-agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: WAZUH_MANAGER
              value: {{ .Values.agent.config.manager_address | quote }}
            - name: WAZUH_PROTOCOL
              value: {{ .Values.agent.config.protocol | quote }}
            - name: WAZUH_MANAGER_PORT
              value: {{ .Values.agent.config.port | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- range .Values.extraEnvVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib-docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: sys-fs-cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: dev
              mountPath: /host/dev
              readOnly: true
            {{- range .Values.extraVolumeMounts }}
            - {{- toYaml . | nindent 14 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "wazuh.fullname" . }}-agent-conf
        - name: rootfs
          hostPath:
            path: /
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib-docker
          hostPath:
            path: /var/lib/docker
        - name: sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: proc
          hostPath:
            path: /proc
        - name: dev
          hostPath:
            path: /dev
        {{- range .Values.extraVolumes }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
{{- end }}
