# Markdownlint configuration for NOAH project
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Extend the default configuration
extends: null

# Rule configuration
rules:
  # Line length
  MD013:
    line_length: 120
    # Allow tables and code blocks to exceed line length
    tables: false
    code_blocks: false

  # Unordered list style
  MD004:
    style: "dash"

  # Ordered list item prefix
  MD029:
    style: "ordered"

  # Inline HTML
  MD033:
    allowed_elements: ["br", "sup", "sub", "kbd", "details", "summary"]

  # Bare URL used
  MD034: false

  # Emphasis used instead of a heading
  MD036: false

  # Multiple top-level headings in the same document
  MD025: false

  # First line in a file should be a top-level heading
  MD041: false

  # Trailing punctuation in heading
  MD026:
    punctuation: ".,;:!?"
