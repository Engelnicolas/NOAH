# NOAH Kubernetes cluster inventory - Single node development setup
all:
  hosts:
    noah-master-1:
      ansible_host: 127.0.0.1
      ip: 127.0.0.1
      access_ip: 127.0.0.1
      ansible_connection: local
  children:
    kube_control_plane:
      hosts:
        noah-master-1:
    kube_node:
      hosts:
        noah-master-1:
    etcd:
      hosts:
        noah-master-1:
    k8s_cluster:
      children:
        kube_control_plane:
        kube_node:
    calico_rr:
      hosts: {}
