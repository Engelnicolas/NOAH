---
- name: Provision infrastructure for NOAH cluster
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    cloud_provider: "{{ noah_cloud_provider | default('openstack') }}"  # aws, gcp, openstack, vsphere
    vm_config:
      master_nodes: "{{ noah_master_nodes | default(1) }}"
      worker_nodes: "{{ noah_worker_nodes | default(2) }}"
      vm_flavor: "{{ noah_vm_flavor | default('m1.large') }}"
      vm_image: "{{ noah_vm_image | default('ubuntu-24.04') }}"
      network_name: "{{ noah_network_name | default('noah-network') }}"
      security_group: "{{ noah_security_group | default('noah-sg') }}"
      key_name: "{{ noah_key_name | default('noah-keypair') }}"
  tasks:
    - name: Display provisioning start message
      ansible.builtin.debug:
        msg: "Starting infrastructure provisioning for {{ cloud_provider }}"

    - name: Validate configuration
      ansible.builtin.assert:
        that:
          - cloud_provider in ['aws', 'gcp', 'openstack', 'vsphere', 'docker']
          - vm_config.master_nodes | int > 0
          - vm_config.worker_nodes | int >= 0
        fail_msg: "Invalid configuration parameters"
        success_msg: "Configuration validation passed"

    - name: Create network infrastructure
      block:
        - name: Create VPC/Network
          ansible.builtin.debug:
            msg: "Creating network {{ vm_config.network_name }}"
          # Ici on ajouterait les tâches spécifiques au provider cloud
        
        - name: (OpenStack example) Ensure OpenStack network exists
          when:
            - cloud_provider == 'openstack'
            - (noah_enable_openstack_example | default(false)) | bool
          block:
            - name: Ensure network exists
              openstack.cloud.network:
                cloud: "{{ noah_openstack_cloud | default(omit) }}"
                state: present
                name: "{{ vm_config.network_name }}"
            - name: Ensure subnet exists
              openstack.cloud.subnet:
                cloud: "{{ noah_openstack_cloud | default(omit) }}"
                state: present
                name: "{{ vm_config.network_name }}-subnet"
                network_name: "{{ vm_config.network_name }}"
                cidr: "{{ noah_openstack_subnet_cidr | default('10.80.0.0/24') }}"
                enable_dhcp: true
            - name: Ensure security group exists with basic K8s rules
              openstack.cloud.security_group:
                cloud: "{{ noah_openstack_cloud | default(omit) }}"
                state: present
                name: "{{ vm_config.security_group }}"
                description: "NOAH Kubernetes SG"
            - name: Ensure SG rules for Kubernetes API and nodes
              openstack.cloud.security_group_rule:
                cloud: "{{ noah_openstack_cloud | default(omit) }}"
                security_group: "{{ vm_config.security_group }}"
                protocol: tcp
                port_range_min: "{{ item.min }}"
                port_range_max: "{{ item.max }}"
                remote_ip_prefix: "{{ noah_openstack_allow_cidr | default('0.0.0.0/0') }}"
                direction: ingress
                state: present
              loop:
                - { min: 22,   max: 22 }
                - { min: 80,   max: 80 }
                - { min: 443,  max: 443 }
                - { min: 6443, max: 6443 }
                - { min: 2379, max: 2380 }
                - { min: 10250, max: 10252 }
                - { min: 30000, max: 32767 }
              loop_control:
                label: "port {{ item.min }}-{{ item.max }}"
            - name: Ensure keypair exists
              openstack.cloud.keypair:
                cloud: "{{ noah_openstack_cloud | default(omit) }}"
                state: present
                name: "{{ vm_config.key_name }}"
                public_key_file: "{{ noah_openstack_public_key | default('~/.ssh/id_rsa.pub') }}"
          
        - name: Create security groups
          ansible.builtin.debug:
            msg: "Creating security group {{ vm_config.security_group }}"
          # Règles firewall pour K8s (ports 6443, 2379-2380, 10250, 10251, 10252, etc.)
          #
          # Exemple Proxmox (commenté):
          # Proxmox ne gère pas des "security groups" de la même manière. Utilisez
          # des règles de firewall de datacenter/nœud/VM si nécessaire ou configurez-les
          # hors Ansible. Les VMs peuvent être créées avec community.general.proxmox_kvm.
          
        - name: Create SSH key pair
          ansible.builtin.debug:
            msg: "Creating SSH key pair {{ vm_config.key_name }}"
      when: cloud_provider != 'docker'

    - name: Provision master nodes
      ansible.builtin.debug:
        msg: "Creating {{ vm_config.master_nodes }} master nodes"
      loop: "{{ range(1, vm_config.master_nodes | int + 1) | list }}"
      loop_control:
        label: "master-{{ item }}"
      when: cloud_provider != 'docker'
      # Ici on créerait les VMs masters
      # Exemple OpenStack (activé via noah_enable_openstack_example=true)
  # Exemple Proxmox (commenté)
  # - name: Create master VM on Proxmox
  #   when: cloud_provider == 'proxmox'
  #   community.general.proxmox_kvm:
  #     api_user: "{{ proxmox_api_user }}"
  #     api_token_id: "{{ proxmox_token_id }}"
  #     api_token_secret: "{{ proxmox_token_secret }}"
  #     api_host: "{{ proxmox_api_host }}"
  #     node: "{{ proxmox_node | default('pve') }}"
  #     vmid: "{{ 700 + item | int }}"
  #     name: "noah-master-{{ item }}"
  #     memory: 8192
  #     cores: 4
  #     sata:
  #       sata0: "local-lvm:32"
  #     net:
  #       net0: "virtio,bridge={{ proxmox_bridge | default('vmbr0') }}"
  #     ostype: l26
  #     scsihw: virtio-scsi-pci
  #     ide:
  #       ide2: "local:cloudinit"
  #     ciuser: "ubuntu"
  #     sshkeys: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
  #     cipassword: "{{ proxmox_ci_password | default(omit) }}"
