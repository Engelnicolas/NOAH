  #       ipconfig0: "ip=dhcp"
      # - name: Create master VM on OpenStack
      #   when:
      #     - cloud_provider == 'openstack'
      #     - (noah_enable_openstack_example | default(false)) | bool
      #   openstack.cloud.server:
      #     cloud: "{{ noah_openstack_cloud | default(omit) }}"
      #     state: present
      #     name: "noah-master-{{ item }}"
      #     image: "{{ vm_config.vm_image }}"
      #     flavor: "{{ vm_config.vm_flavor }}"
      #     key_name: "{{ vm_config.key_name }}"
      #     security_groups:
      #       - "{{ vm_config.security_group }}"
      #     nics:
      #       - net-name: "{{ vm_config.network_name }}"
      #     config_drive: true
      #     auto_ip: true

    - name: Provision worker nodes  
      ansible.builtin.debug:
        msg: "Creating {{ vm_config.worker_nodes }} worker nodes"
      loop: "{{ range(1, vm_config.worker_nodes | int + 1) | list }}"
      loop_control:
        label: "worker-{{ item }}"
      when: cloud_provider != 'docker'
      # Ici on créerait les VMs workers
  # Exemple OpenStack (activé via noah_enable_openstack_example=true)
  # Exemple Proxmox (commenté)
  # - name: Create worker VM on Proxmox
  #   when: cloud_provider == 'proxmox'
  #   community.general.proxmox_kvm:
  #     api_user: "{{ proxmox_api_user }}"
  #     api_token_id: "{{ proxmox_token_id }}"
  #     api_token_secret: "{{ proxmox_token_secret }}"
  #     api_host: "{{ proxmox_api_host }}"
  #     node: "{{ proxmox_node | default('pve') }}"
  #     vmid: "{{ 800 + item | int }}"
  #     name: "noah-worker-{{ item }}"
  #     memory: 8192
  #     cores: 4
  #     sata:
  #       sata0: "local-lvm:32"
  #     net:
  #       net0: "virtio,bridge={{ proxmox_bridge | default('vmbr0') }}"
  #     ostype: l26
  #     scsihw: virtio-scsi-pci
  #     ide:
  #       ide2: "local:cloudinit"
  #     ciuser: "ubuntu"
  #     sshkeys: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
  #     cipassword: "{{ proxmox_ci_password | default(omit) }}"
  #     ipconfig:
  #       ipconfig0: "ip=dhcp"
  # - name: Create worker VM on OpenStack
  #   when:
  #     - cloud_provider == 'openstack'
  #     - (noah_enable_openstack_example | default(false)) | bool
  #   openstack.cloud.server:
  #     cloud: "{{ noah_openstack_cloud | default(omit) }}"
  #     state: present
  #     name: "noah-worker-{{ item }}"
  #     image: "{{ vm_config.vm_image }}"
  #     flavor: "{{ vm_config.vm_flavor }}"
  #     key_name: "{{ vm_config.key_name }}"
  #     security_groups:
  #       - "{{ vm_config.security_group }}"
  #     nics:
  #       - net-name: "{{ vm_config.network_name }}"
  #     config_drive: true
  #     auto_ip: true

    - name: Handle Docker deployment mode
      block:
        - name: Display Docker mode message
          ansible.builtin.debug:
            msg: "Using Docker Compose mode - no VM provisioning needed"
        
        - name: Check if Docker is available
          ansible.builtin.command: docker --version
          register: docker_version
          changed_when: false
          failed_when: false
          
        - name: Display Docker version
          ansible.builtin.debug:
            msg: "Docker version: {{ docker_version.stdout }}"
          when: docker_version.rc == 0
          
        - name: Warn if Docker is not available
          ansible.builtin.debug:
            msg: "WARNING: Docker is not installed or not available. Please install Docker to use Docker mode."
          when: docker_version.rc != 0
      when: cloud_provider == 'docker'

    - name: Configure DNS records
      ansible.builtin.debug:
        msg: "Configuring DNS records for cluster nodes"
      when: cloud_provider != 'docker'
        
    - name: Wait for VMs to be ready
      ansible.builtin.debug:
        msg: "Waiting for all VMs to be accessible via SSH"
      when: cloud_provider != 'docker'
      # On attendrait que toutes les VMs soient prêtes

    - name: Update inventory with actual IPs
      ansible.builtin.debug:
        msg: "Updating inventory with provisioned VM IPs"
      when: cloud_provider != 'docker'
      # On mettrait à jour l'inventaire avec les vraies IPs

    - name: Validate infrastructure
      ansible.builtin.debug:
        msg: "Infrastructure provisioning completed successfully for {{ cloud_provider }} mode"
