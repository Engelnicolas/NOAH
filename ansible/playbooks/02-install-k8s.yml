---
- name: Prepare nodes for Kubernetes installation
  hosts: "{{ 'localhost' if (ansible_check_mode | default(false)) else 'all' }}"
  become: "{{ false if (ansible_check_mode | default(false)) else true }}"
  gather_facts: "{{ false if (ansible_check_mode | default(false)) else true }}"
  vars_files:
    - ../vars/global.yml
  tasks:
    - name: Skip node preparation in check mode
      ansible.builtin.debug:
        msg: "Skipping node preparation in --check mode (no remote SSH)"
      when: ansible_check_mode | default(false)

    - name: End play early in check mode
      meta: end_play
      when: ansible_check_mode | default(false)

    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - python3-pip
          - python3-netaddr
          - docker.io
          - docker-compose
        state: present
      when: ansible_os_family == "Debian"

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user | default(ansible_env.USER) | default('root') }}"
        groups: docker
        append: yes

    - name: Disable swap
      shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

    - name: Enable kernel modules
      community.general.modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { name: "net.ipv4.ip_forward", value: "1" }

- name: Install Kubernetes (K3s for single-node development)
  hosts: "{{ 'localhost' if (ansible_check_mode | default(false)) else 'all' }}"
  become: "{{ false if (ansible_check_mode | default(false)) else true }}"
  gather_facts: "{{ false if (ansible_check_mode | default(false)) else true }}"
  vars_files:
    - ../vars/global.yml
  vars:
    k3s_version: "{{ kube_version | default('v1.28.2') }}"
    target_user: "{{ ansible_user | default(ansible_env.USER) | default('root') }}"
    user_home: "{{ '/root' if (target_user == 'root') else ('/home/' + target_user) }}"
    
  tasks:
    - name: Skip K3s installation in check mode
      ansible.builtin.debug:
        msg: "Skipping K3s installation in --check mode"
      when: ansible_check_mode | default(false)

    - name: End play early in check mode
      meta: end_play
      when: ansible_check_mode | default(false)

    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_installed

    - name: Download and install K3s
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}+k3s1" sh -s - --write-kubeconfig-mode 644
      when: not k3s_installed.stat.exists

    - name: Wait for K3s to be ready
      wait_for:
        port: 6443
        host: 127.0.0.1
        delay: 10
        timeout: 300

    - name: Create .kube directory
      file:
        path: "{{ user_home }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Copy kubeconfig for user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ user_home }}/.kube/config"
        mode: '0644'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        remote_src: yes

    - name: Update kubeconfig server address
      replace:
        path: "{{ user_home }}/.kube/config"
        regexp: 'https://127.0.0.1:6443'
        replace: 'https://127.0.0.1:6443'

- name: Verify Kubernetes installation
  hosts: "{{ 'localhost' if (ansible_check_mode | default(false)) else 'all' }}"
  become: "{{ false if (ansible_check_mode | default(false)) else false }}"
  gather_facts: "{{ false if (ansible_check_mode | default(false)) else true }}"
  vars_files:
    - ../vars/global.yml
  vars:
    target_user: "{{ ansible_user | default(ansible_env.USER) | default('root') }}"
    user_home: "{{ '/root' if (target_user == 'root') else ('/home/' + target_user) }}"
  tasks:
    - name: Skip verification in check mode
      ansible.builtin.debug:
        msg: "Skipping verification in --check mode"
      when: ansible_check_mode | default(false)

    - name: End play early in check mode
      meta: end_play
      when: ansible_check_mode | default(false)

    - name: Wait for K3s API to be ready
      wait_for:
        port: 6443
        host: 127.0.0.1
        delay: 10
        timeout: 300

    - name: Test kubectl access
      shell: kubectl get nodes
      register: kubectl_test
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      retries: 5
      delay: 10
      until: kubectl_test.rc == 0

    - name: Get cluster info
      shell: kubectl cluster-info
      register: cluster_info
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Display cluster info
      debug:
        msg: "{{ cluster_info.stdout_lines }}"

    - name: Get node status
      shell: kubectl get nodes -o wide
      register: node_status
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Display node status
      debug:
        msg: "{{ node_status.stdout_lines }}"

    - name: Create kubeconfig directory locally
      file:
        path: "../kubeconfig"
        state: directory
        mode: '0755'
      delegate_to: localhost

    - name: Copy kubeconfig for local use
      copy:
        src: "{{ user_home }}/.kube/config"
        dest: "../kubeconfig/{{ cluster_name | default('noah-cluster') }}-kubeconfig"
        mode: '0644'
        remote_src: yes
