---
- name: Configure Kubernetes cluster for NOAH
  hosts: all
  become: true
  vars_files:
    - ../vars/global.yml
  vars:
    helm_version: "3.13.2"
    noah_namespace: "noah"
    monitoring_namespace: "monitoring"
    target_user: "{{ ansible_user | default(ansible_env.USER) | default('root') }}"
    user_home: "{{ '/root' if (target_user == 'root') else ('/home/' + target_user) }}"
    
  tasks:
    - name: Load SOPS encrypted secrets
      community.sops.load_vars:
        file: ../vars/secrets.yml
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: Install kubernetes.core collection
      shell: ansible-galaxy collection install kubernetes.core
      delegate_to: localhost
      run_once: true
      become: false

    - name: Create kubeconfig directory
      file:
        path: "{{ user_home }}/.kube"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0755'

    - name: Copy kubeconfig for user (K3s)
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ user_home }}/.kube/config"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: '0600'
        remote_src: yes

    - name: Download Helm binary
      get_url:
        url: "https://get.helm.sh/helm-v{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        mode: '0644'

    - name: Extract Helm
      unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Install Helm binary
      copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        mode: '0755'
        remote_src: yes

    - name: Verify Helm installation
      shell: helm version --short
      register: helm_version_output
      become_user: "{{ target_user }}"

    - name: Display Helm version
      debug:
        msg: "{{ helm_version_output.stdout }}"

    - name: Add Helm repositories
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: "stable", url: "https://charts.helm.sh/stable" }
        - { name: "bitnami", url: "https://charts.bitnami.com/bitnami" }
        - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
        - { name: "grafana", url: "https://grafana.github.io/helm-charts" }
        - { name: "ingress-nginx", url: "https://kubernetes.github.io/ingress-nginx" }
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Update Helm repositories
      shell: helm repo update
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Create namespaces
      kubernetes.core.k8s:
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop:
        - "{{ noah_namespace }}"
        - "{{ monitoring_namespace }}"
        - "ingress-nginx"
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Add cert-manager Helm repository
      kubernetes.core.helm_repository:
        name: jetstack
        repo_url: https://charts.jetstack.io
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      when: cert_manager_enabled | default(true)

    - name: Install cert-manager
      kubernetes.core.helm:
        name: cert-manager
        chart_ref: jetstack/cert-manager
        release_namespace: cert-manager
        create_namespace: true
        values:
          installCRDs: true
          global:
            leaderElection:
              namespace: cert-manager
          prometheus:
            enabled: true
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      when: cert_manager_enabled | default(true)

    - name: Wait for cert-manager to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: cert-manager
        namespace: cert-manager
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      when: cert_manager_enabled | default(true)

    - name: Create Let's Encrypt ClusterIssuer
      kubernetes.core.k8s:
        definition:
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: "{{ letsencrypt_email | default('admin@noah.local') }}"
              privateKeySecretRef:
                name: letsencrypt-prod
              solvers:
              - http01:
                  ingress:
                    class: nginx
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      when: cert_manager_enabled | default(true) and tls_mode | default('letsencrypt') == 'letsencrypt'

    - name: Create TLS secrets
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: noah-tls
            namespace: "{{ noah_namespace }}"
          type: kubernetes.io/tls
          data:
            tls.crt: "{{ tls_cert | b64encode }}"
            tls.key: "{{ tls_key | b64encode }}"
      vars:
        tls_cert: "{{ vault_tls_cert }}"  # Stocké dans Ansible Vault
        tls_key: "{{ vault_tls_key }}"    # Stocké dans Ansible Vault
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"
      when: tls_mode | default('manual') == 'manual' and vault_tls_cert is defined and vault_tls_cert != ""

    - name: Install NGINX Ingress Controller
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        values:
          controller:
            service:
              type: LoadBalancer
            metrics:
              enabled: true
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "10254"
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Wait for NGINX Ingress to be ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: ingress-nginx-controller
        namespace: ingress-nginx
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Install Prometheus stack for monitoring
      kubernetes.core.helm:
        name: prometheus-stack
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: true
        values:
          prometheus:
            prometheusSpec:
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 10Gi
          grafana:
            adminPassword: "{{ grafana.admin_password }}"
            persistence:
              enabled: true
              storageClassName: local-path
              size: 5Gi
            ingress:
              enabled: true
              annotations:
                kubernetes.io/ingress.class: nginx
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - grafana.{{ domain_name }}
              tls:
                - secretName: grafana-tls
                  hosts:
                    - grafana.{{ domain_name }}
      become_user: "{{ target_user }}"
      environment:
        KUBECONFIG: "{{ user_home }}/.kube/config"

    - name: Verify cluster configuration
      shell: |
        kubectl get nodes -o wide
        kubectl get pods --all-namespaces
        kubectl get ingress --all-namespaces
        helm list --all-namespaces
      register: cluster_status
      become_user: "{{ target_user }}"

    - name: Display cluster status
      debug:
        msg: "{{ cluster_status.stdout_lines }}"

    - name: Create NOAH service account
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: noah-service-account
            namespace: "{{ noah_namespace }}"
      become_user: "{{ target_user }}"

    - name: Create NOAH cluster role binding
      kubernetes.core.k8s:
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: noah-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
          - kind: ServiceAccount
            name: noah-service-account
            namespace: "{{ noah_namespace }}"
      become_user: "{{ target_user }}"
