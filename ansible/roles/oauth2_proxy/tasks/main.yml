- name: Deploy OAuth2 Proxy using helm
  kubernetes.core.helm:
    name: oauth2-proxy
    chart_ref: '{{ playbook_dir }}/../helm/oauth2-proxy'
    release_namespace: '{{ namespace }}'
    create_namespace: false
    values:
      replicaCount: 2
      image:
        repository: quay.io/oauth2-proxy/oauth2-proxy
        tag: v7.4.0
        pullPolicy: IfNotPresent
      config:
        clientID: oauth2-proxy-client
        clientSecret: '{{ oauth2_proxy_client_secret | default(''changeme123'') }}'
        cookieSecret: '{{ cookie_secret | b64encode }}'
        configFile: 'provider = "keycloak-oidc"

          oidc_issuer_url = "{{ keycloak.issuer_url }}"

          redirect_url = "https://auth.local/oauth2/callback"

          upstreams = ["file:///dev/null"]


          http_address = "0.0.0.0:4180"

          email_domains = ["*"]

          cookie_domains = [".local"]

          cookie_secure = false

          cookie_httponly = true

          cookie_expire = "168h"

          cookie_refresh = "60m"


          set_authorization_header = true

          set_xauthrequest = true

          pass_access_token = true

          pass_user_headers = true


          skip_provider_button = false

          skip_auth_strip_headers = false

          '
      service:
        type: ClusterIP
        port: 4180
      ingress:
        enabled: true
        hostname: auth.local
        path: /
        tls: true
      resources:
        limits:
          cpu: 100m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - oauth2-proxy
              topologyKey: kubernetes.io/hostname
  register: oauth2_proxy_deployment
- name: Wait for OAuth2 Proxy pods to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: '{{ namespace }}'
    label_selectors:
    - app=oauth2-proxy
    wait: true
    wait_condition:
      type: Ready
      status: 'True'
    wait_timeout: 300
  register: oauth2_proxy_pods
- name: Create OAuth2 Proxy configuration ConfigMap
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: oauth2-proxy-config
        namespace: '{{ namespace }}'
      data:
        oauth2_proxy.cfg: "# OAuth2 Proxy Configuration for NOAH\nprovider = \"keycloak-oidc\"\noidc_issuer_url = \"{{ keycloak.issuer_url\
          \ }}\"\nclient_id = \"oauth2-proxy-client\"\nclient_secret = \"{{ oauth2_proxy_client_secret | default('changeme123')\
          \ }}\"\n\n# Security settings\ncookie_secret = \"{{ cookie_secret | b64encode }}\"\ncookie_secure = false  # Set\
          \ to true in production with HTTPS\ncookie_httponly = true\ncookie_expire = \"168h\"\ncookie_refresh = \"60m\"\n\
          cookie_domains = [\".local\"]\n\n# Authentication settings\nemail_domains = [\"*\"]\nwhitelist_domains = [\".local\"\
          ]\n\n# Header settings for upstream services\nset_authorization_header = true\nset_xauthrequest = true\npass_access_token\
          \ = true\npass_user_headers = true\npass_host_header = true\n\n# Logging\nrequest_logging = true\nauth_logging =\
          \ true\nstandard_logging = true\n\n# Skip authentication for health checks\nskip_auth_regex = [\n  \"^/health\"\
          ,\n  \"^/ping\",\n  \"^/ready\"\n]\n"
- name: Create ingress rules for protected services
  kubernetes.core.k8s:
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: '{{ item.name }}-protected'
        namespace: '{{ namespace }}'
        annotations:
          nginx.ingress.kubernetes.io/auth-url: https://auth.local/oauth2/auth
          nginx.ingress.kubernetes.io/auth-signin: https://auth.local/oauth2/start?rd=$escaped_request_uri
          nginx.ingress.kubernetes.io/auth-response-headers: x-auth-request-user,x-auth-request-email,x-auth-request-access-token
      spec:
        tls:
        - hosts:
          - '{{ item.hostname }}'
          secretName: '{{ item.name }}-tls'
        rules:
        - host: '{{ item.hostname }}'
          http:
            paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: '{{ item.service }}'
                  port:
                    number: '{{ item.port }}'
  loop:
  - name: nextcloud
    hostname: nextcloud.local
    service: nextcloud
    port: 80
  - name: mattermost
    hostname: mattermost.local
    service: mattermost
    port: 8065
  - name: gitlab
    hostname: gitlab.local
    service: gitlab
    port: 80
  - name: grafana
    hostname: grafana.local
    service: grafana
    port: 3000
  register: protected_ingress
- name: Verify OAuth2 Proxy health
  uri:
    url: http://{{ oauth2_proxy_pods.resources[0].status.podIP }}:4180/ping
    method: GET
    status_code: 200
  register: oauth2_proxy_health
  until: oauth2_proxy_health.status == 200
  retries: 10
  delay: 10
- name: Display OAuth2 Proxy deployment status
  debug:
    msg: 'OAuth2 Proxy deployment completed:

      - Authentication Gateway: https://auth.local

      - Protected Services: {{ protected_ingress.results | map(attribute=''definition.spec.rules.0.host'') | list | join('',
      '') }}

      - Provider: Keycloak OIDC

      - Cookie Domain: .local

      - Running Pods: {{ oauth2_proxy_pods.resources | length }}

      - Health Check: {{ oauth2_proxy_health.status == 200 | ternary(''Healthy'', ''Unhealthy'') }}

      '
