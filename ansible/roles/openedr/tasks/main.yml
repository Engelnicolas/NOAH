- name: Deploy OpenEDR Server using helm
  kubernetes.core.helm:
    name: openedr
    chart_ref: '{{ playbook_dir }}/../helm/openedr'
    release_namespace: '{{ namespace }}'
    create_namespace: false
    values:
      server:
        replicaCount: 1
        image:
          repository: openedr/openedr-server
          tag: latest
          pullPolicy: IfNotPresent
        service:
          type: ClusterIP
          port: 8080
        ingress:
          enabled: true
          hostname: openedr.local
          tls: true
        database:
          type: postgresql
          host: openedr-postgresql
          port: 5432
          name: openedr
          username: openedr
          password: '{{ openedr_db_password | default(''changeme123'') }}'
        config:
          server:
            port: 8080
            host: 0.0.0.0
          security:
            jwt_secret: '{{ openedr_jwt_secret | default(''changeme123456789'') }}'
            admin_password: '{{ openedr_admin_password | default(''changeme123'') }}'
          collection:
            interval: 60
            retention_days: 90
          alerts:
            email_enabled: false
            webhook_url: '{{ openedr_webhook_url | default('''') }}'
        persistence:
          enabled: true
          size: 20Gi
          storageClass: ''
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
      agent:
        enabled: true
        image:
          repository: openedr/openedr-agent
          tag: latest
          pullPolicy: IfNotPresent
        config:
          server_url: https://openedr.local
          agent_id: kubernetes-cluster
          collection_interval: 60
        daemonset:
          enabled: true
          hostNetwork: true
          hostPID: true
          privileged: true
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
  register: openedr_deployment
- name: Deploy OpenEDR PostgreSQL database
  kubernetes.core.helm:
    name: openedr-postgresql
    chart_ref: bitnami/postgresql
    release_namespace: '{{ namespace }}'
    create_namespace: false
    values:
      auth:
        database: openedr
        username: openedr
        password: '{{ openedr_db_password | default(''changeme123'') }}'
        postgresPassword: '{{ openedr_db_root_password | default(''changeme123'') }}'
      primary:
        persistence:
          enabled: true
          size: 10Gi
  register: openedr_db_deployment
- name: Wait for OpenEDR PostgreSQL to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: '{{ namespace }}'
    label_selectors:
    - app.kubernetes.io/name=postgresql
    wait: true
    wait_condition:
      type: Ready
      status: 'True'
    wait_timeout: 300
- name: Wait for OpenEDR Server to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: '{{ namespace }}'
    label_selectors:
    - app=openedr-server
    wait: true
    wait_condition:
      type: Ready
      status: 'True'
    wait_timeout: 600
  register: openedr_server_pods
- name: Deploy OpenEDR Agent DaemonSet
  kubernetes.core.k8s:
    definition:
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: openedr-agent
        namespace: '{{ namespace }}'
        labels:
          app: openedr-agent
      spec:
        selector:
          matchLabels:
            app: openedr-agent
        template:
          metadata:
            labels:
              app: openedr-agent
          spec:
            hostNetwork: true
            hostPID: true
            containers:
            - name: openedr-agent
              image: openedr/openedr-agent:latest
              env:
              - name: OPENEDR_SERVER_URL
                value: http://openedr-server.{{ namespace }}.svc.cluster.local:8080
              - name: OPENEDR_AGENT_ID
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              - name: OPENEDR_COLLECTION_INTERVAL
                value: '60'
              - name: OPENEDR_LOG_LEVEL
                value: INFO
              securityContext:
                privileged: true
              volumeMounts:
              - name: proc
                mountPath: /host/proc
                readOnly: true
              - name: sys
                mountPath: /host/sys
                readOnly: true
              - name: root
                mountPath: /host/root
                readOnly: true
              - name: var-log
                mountPath: /host/var/log
                readOnly: true
              - name: etc
                mountPath: /host/etc
                readOnly: true
              - name: dev
                mountPath: /host/dev
                readOnly: true
              resources:
                limits:
                  cpu: 200m
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
            volumes:
            - name: proc
              hostPath:
                path: /proc
            - name: sys
              hostPath:
                path: /sys
            - name: root
              hostPath:
                path: /
            - name: var-log
              hostPath:
                path: /var/log
            - name: etc
              hostPath:
                path: /etc
            - name: dev
              hostPath:
                path: /dev
            tolerations:
            - operator: Exists
              effect: NoSchedule
  register: openedr_agent_deployment
- name: Wait for OpenEDR Agent pods to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: '{{ namespace }}'
    label_selectors:
    - app=openedr-agent
    wait: true
    wait_condition:
      type: Ready
      status: 'True'
    wait_timeout: 300
  register: openedr_agent_pods
- name: Create OpenEDR detection rules ConfigMap
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: openedr-detection-rules
        namespace: '{{ namespace }}'
      data:
        rules.yaml: "# OpenEDR Detection Rules for NOAH\nrules:\n  - name: \"Suspicious Process Execution\"\n    type: \"\
          process\"\n    severity: \"high\"\n    conditions:\n      - field: \"process.name\"\n        operator: \"regex\"\
          \n        value: \"(nc|netcat|ncat|telnet|wget|curl).*\"\n      - field: \"process.args\"\n        operator: \"\
          contains\"\n        value: \"bash\"\n    description: \"Suspicious process execution detected\"\n\n  - name: \"\
          Privilege Escalation Attempt\"\n    type: \"process\"\n    severity: \"critical\"\n    conditions:\n      - field:\
          \ \"process.name\"\n        operator: \"in\"\n        value: [\"sudo\", \"su\", \"doas\"]\n      - field: \"user.name\"\
          \n        operator: \"not_in\"\n        value: [\"root\", \"admin\"]\n    description: \"Privilege escalation attempt\
          \ detected\"\n\n  - name: \"Unusual Network Connection\"\n    type: \"network\"\n    severity: \"medium\"\n    conditions:\n\
          \      - field: \"network.direction\"\n        operator: \"equals\"\n        value: \"outbound\"\n      - field:\
          \ \"network.port\"\n        operator: \"not_in\"\n        value: [80, 443, 53, 22, 3389]\n    description: \"Unusual\
          \ outbound network connection\"\n\n  - name: \"File System Tampering\"\n    type: \"file\"\n    severity: \"high\"\
          \n    conditions:\n      - field: \"file.path\"\n        operator: \"regex\"\n        value: \"/(etc|bin|sbin|usr/bin|usr/sbin)/.*\"\
          \n      - field: \"file.action\"\n        operator: \"in\"\n        value: [\"modify\", \"delete\", \"create\"]\n\
          \    description: \"Critical system file modification detected\"\n\n  - name: \"Container Escape Attempt\"\n   \
          \ type: \"process\"\n    severity: \"critical\"\n    conditions:\n      - field: \"process.name\"\n        operator:\
          \ \"in\"\n        value: [\"docker\", \"kubectl\", \"crictl\", \"runc\"]\n      - field: \"process.args\"\n    \
          \    operator: \"contains_any\"\n        value: [\"--privileged\", \"--cap-add\", \"--security-opt\"]\n    description:\
          \ \"Potential container escape attempt\"\n\n  - name: \"Crypto Mining Activity\"\n    type: \"process\"\n    severity:\
          \ \"high\"\n    conditions:\n      - field: \"process.name\"\n        operator: \"regex\"\n        value: \".*(mine|miner|xmrig|cpuminer).*\"\
          \n      - field: \"process.cpu_percent\"\n        operator: \"greater_than\"\n        value: 80\n    description:\
          \ \"Cryptocurrency mining activity detected\"\n"
- name: Initialize OpenEDR database schema
  kubernetes.core.k8s_exec:
    namespace: '{{ namespace }}'
    pod: '{{ openedr_server_pods.resources[0].metadata.name }}'
    command:
    - /bin/bash
    - -c
    - "set -e\n\n# Wait for database to be ready\nuntil pg_isready -h openedr-postgresql -p 5432 -U openedr; do\n  echo \"\
      Waiting for PostgreSQL to be ready...\"\n  sleep 5\ndone\n\n# Initialize database schema\npython3 /app/manage.py migrate\n\
      \n# Create admin user\npython3 /app/manage.py shell -c \"\nfrom django.contrib.auth.models import User\nif not User.objects.filter(username='admin').exists():\n\
      \    User.objects.create_superuser('admin', 'admin@noah.local', '{{ openedr_admin_password | default('changeme123')\
      \ }}')\n    print('Admin user created')\nelse:\n    print('Admin user already exists')\n\"\n\necho \"OpenEDR initialization\
      \ completed\"\n"
  register: openedr_init
  failed_when: openedr_init.rc != 0
- name: Configure OpenEDR for Kubernetes monitoring
  kubernetes.core.k8s_exec:
    namespace: '{{ namespace }}'
    pod: '{{ openedr_server_pods.resources[0].metadata.name }}'
    command:
    - /bin/bash
    - -c
    - "set -e\n\n# Configure monitoring policies\ncat > /tmp/k8s_policy.json << 'EOF'\n{\n  \"name\": \"Kubernetes Security\
      \ Policy\",\n  \"description\": \"Security monitoring for Kubernetes cluster\",\n  \"rules\": [\n    {\n      \"name\"\
      : \"Container Runtime Security\",\n      \"enabled\": true,\n      \"severity\": \"high\"\n    },\n    {\n      \"name\"\
      : \"Pod Security Standards\",\n      \"enabled\": true,\n      \"severity\": \"medium\"\n    },\n    {\n      \"name\"\
      : \"Network Policy Violations\",\n      \"enabled\": true,\n      \"severity\": \"high\"\n    }\n  ]\n}\nEOF\n\n# Apply\
      \ monitoring policy\ncurl -X POST http://localhost:8080/api/v1/policies \\\n  -H \"Content-Type: application/json\"\
      \ \\\n  -d @/tmp/k8s_policy.json \\\n  -u admin:{{ openedr_admin_password | default('changeme123') }} || true\n\necho\
      \ \"OpenEDR Kubernetes monitoring configured\"\n"
  register: openedr_k8s_config
  failed_when: false
- name: Verify OpenEDR Server health
  uri:
    url: http://{{ openedr_server_pods.resources[0].status.podIP }}:8080/api/v1/health
    method: GET
    status_code: 200
  register: openedr_health
  until: openedr_health.status == 200
  retries: 15
  delay: 20
- name: Check OpenEDR agent registration
  uri:
    url: http://{{ openedr_server_pods.resources[0].status.podIP }}:8080/api/v1/agents
    method: GET
    headers:
      Authorization: Basic {{ ('admin:' + (openedr_admin_password | default('changeme123'))) | b64encode }}
    status_code: 200
  register: openedr_agents
  until: openedr_agents.status == 200
  retries: 10
  delay: 15
- name: Display OpenEDR deployment status
  debug:
    msg: 'OpenEDR endpoint detection and response deployment completed:


      🔍 OpenEDR Server:

      - URL: https://openedr.local

      - Admin User: admin

      - Admin Password: {{ openedr_admin_password | default(''changeme123'') }}

      - Health: {{ openedr_health.status == 200 | ternary(''Healthy'', ''Unhealthy'') }}

      - Pod: {{ openedr_server_pods.resources[0].metadata.name }}

      - API Endpoint: /api/v1/


      🤖 OpenEDR Agents:

      - DaemonSet: Deployed on all nodes

      - Active Agents: {{ openedr_agent_pods.resources | length }}

      - Registration: {{ openedr_agents.status == 200 | ternary(''Success'', ''Pending'') }}

      - Collection Interval: 60 seconds


      🗄️  Database:

      - PostgreSQL: Deployed and initialized

      - Schema: Created

      - Storage: 10Gi


      🛡️  Detection Rules:

      - Suspicious Process Execution

      - Privilege Escalation Attempts

      - Unusual Network Connections

      - File System Tampering

      - Container Escape Attempts

      - Crypto Mining Activity


      📊 Monitoring Policies:

      - Container Runtime Security

      - Pod Security Standards

      - Network Policy Violations

      - Kubernetes Security Events


      📝 Next Steps:

      1. Access web interface at https://openedr.local

      2. Login with admin/{{ openedr_admin_password | default(''changeme123'') }}

      3. Review agent registration status

      4. Configure alert notifications

      5. Customize detection rules

      6. Set up incident response workflows

      7. Monitor security events and alerts


      ⚠️  Security Notes:

      - Change default admin password immediately

      - Configure HTTPS certificates for production

      - Set up proper backup for detection data

      - Review and tune detection rules regularly

      '
