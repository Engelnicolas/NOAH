applications:
  gitlab:
    enabled: true
    hostname: gitlab.noah.local
    storage_size: 50Gi
  grafana:
    enabled: true
    hostname: grafana.noah.local
    storage_size: 10Gi
  keycloak:
    enabled: true
    hostname: keycloak.noah.local
    realm: noah
  mattermost:
    enabled: true
    hostname: mattermost.noah.local
  nextcloud:
    enabled: true
    hostname: nextcloud.noah.local
    storage_size: 100Gi
  oauth2_proxy:
    enabled: true
  openedr:
    enabled: true
  postgresql:
    database: noah
    enabled: true
    storage_size: 20Gi
    username: noah
    version: 15.4.0
  prometheus:
    enabled: true
    hostname: prometheus.noah.local
    retention: 30d
    storage_size: 20Gi
  wazuh:
    enabled: true
backup_enabled: true
backup_retention: 30d
backup_schedule: 0 2 * * *
cert_manager_enabled: true
cloud_provider: baremetal
cluster_name: noah-cluster
domain_name: noah.local
ingress_class: nginx
ingress_domain: noah.local
ingress_enabled: true
ingress_ip: 127.0.0.1
kube_network_plugin: calico
kube_version: v1.28.2
letsencrypt_email: admin@noah.local
metrics_retention: 30d
monitoring_enabled: true
namespaces:
- labels:
    environment: development
  name: noah
- labels:
    environment: development
  name: monitoring
noah_vms: []
pod_subnet: 10.233.64.0/18
provision_vms: false
service_subnet: 10.233.0.0/18
storage_class: local-storage
storage_provisioner: kubernetes.io/no-provisioner
tls_enabled: true
tls_mode: letsencrypt
