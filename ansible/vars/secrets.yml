# Secrets pour le déploiement NOAH - À chiffrer avec ansible-vault
# ⚠️  REMPLACEZ TOUTES CES VALEURS PAR DES SECRETS SÉCURISÉS EN PRODUCTION

# Base de données PostgreSQL
vault_postgres_password: "xxx"
vault_noah_db_password: "xxx"

# Keycloak - Authentification SSO
vault_keycloak_admin_password: "xxx"

# GitLab - Gestion de code
vault_gitlab_root_password: "xxx"

# Nextcloud - Stockage collaboratif
vault_nextcloud_admin_password: "xxx"

# Grafana - Monitoring et métriques
vault_grafana_password: "xxx"

# Mattermost - Communication d'équipe
vault_mattermost_db_password: "xxx"

# OAuth2 Proxy - Authentification centralisée
vault_oauth2_client_secret: "xxx"

# Certificats TLS - À remplacer par vos vrais certificats
vault_tls_cert: |
  -----BEGIN CERTIFICATE-----
  MIICertificateDataExampleReplaceMeWithRealCertificateContent123
  ThisIsJustAnExampleCertificateForNOAHClusterConfiguration456
  -----END CERTIFICATE-----

vault_tls_key: |
  -----BEGIN PRIVATE KEY-----
  MIIPrivateKeyDataExampleReplaceMeWithRealPrivateKeyContent789
  ThisIsJustAnExamplePrivateKeyForNOAHClusterSSLConfiguration012
  -----END PRIVATE KEY-----

# Clé SSH pour l'accès aux serveurs (générée par script/generate-ssh-keys.sh)
vault_ssh_private_key: |
  -----BEGIN OPENSSH PRIVATE KEY-----
xxx
  -----END OPENSSH PRIVATE KEY-----

# Configuration LDAP/Active Directory (optionnel)
vault_ldap_bind_password: "xxx"

# Configuration SMTP pour les notifications (optionnel)
vault_smtp_password: "xxx"

# JWT Secrets pour les applications
vault_jwt_secret: "xxx"
vault_session_secret: "xxx"

# Clés de chiffrement pour les données sensibles
vault_encryption_key: "xxx"
