{{- if .Values.keycloak.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.fullname" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  keycloak.conf: |
    {{- .Values.configuration | nindent 4 }}
{{- end }}
