# =============================================================================
# Mattermost helm Chart Values Configuration
# =============================================================================
#
# This file contains the configuration values for the Mattermost helm chart.
# Mattermost is an open-source collaboration platform designed for team
# communication, file sharing, and project coordination.
#
# Chart Features:
# - Complete Mattermost Team Edition deployment
# - OIDC/LDAP authentication integration
# - PostgreSQL and Redis dependencies
# - Persistent storage configuration
# - Ingress and TLS termination
# - Monitoring and metrics collection
# - Security hardening and RBAC
# - Auto-scaling and high availability
# - Plugin management and marketplace integration
# - Backup and restore capabilities
#
# Documentation: https://docs.mattermost.com/
# =============================================================================

# Global configuration shared across all components

global:
  imageRegistry: ''
  imagePullSecrets: []
  storageClass: ''
replicaCount: 1
image:
  registry: ''
  repository: mattermost/mattermost-team-edition
  tag: 9.2.0
  pullPolicy: IfNotPresent
  pullSecrets: []
mattermost:
  siteUrl: https://mattermost.noah.local
  servicesSettings:
    siteURL: https://mattermost.noah.local
    websocketURL: wss://mattermost.noah.local
    allowCorsFrom: '*'
    corsExposedHeaders: ''
    corsAllowCredentials: false
    corsDebug: false
    allowedUntrustedInternalConnections: ''
    trustedProxyIPHeader: []
    enableIncomingWebhooks: true
    enableOutgoingWebhooks: true
    enableCommands: true
    enableOAuthServiceProvider: true
    enablePostUsernameOverride: true
    enablePostIconOverride: true
    enableTesting: false
    enableDeveloper: false
    enableSecurityFixAlert: true
    enableInsecureOutgoingConnections: false
    enableMultifactorAuthentication: true
    enforceMultifactorAuthentication: false
    enableUserAccessTokens: true
    allowAuthenticationTransfer: true
    sessionLengthWebInDays: 180
    sessionLengthMobileInDays: 180
    sessionLengthSSOInDays: 30
    sessionCacheInMinutes: 10
    sessionIdleTimeoutInMinutes: 43200
    websocketSecurePort: 443
    websocketPort: 80
    webserverMode: gzip
    enableCustomEmoji: true
    enableEmojiPicker: true
    enableGifPicker: true
    restrictCustomEmojiCreation: all
    enableLinkPreviews: true
    restrictLinkPreviews: ''
    enablePermalinkPreviews: true
    maxFileSize: 104857600
    enablePublicLink: true
    publicLinkSalt: ''
    enableUploads: true
    allowedFileTypes: ''
  teamSettings:
    siteName: NOAH Mattermost
    maxUsersPerTeam: 1000
    enableTeamCreation: true
    enableUserCreation: true
    enableOpenServer: false
    enableUserDeactivation: true
    restrictCreationToDomains: noah.local
    enableCustomBrand: false
    customBrandText: ''
    customDescriptionText: ''
    restrictDirectMessage: any
    restrictTeamInvite: all
    restrictPublicChannelManagement: all
    restrictPrivateChannelManagement: all
    restrictPublicChannelCreation: all
    restrictPrivateChannelCreation: all
    restrictPublicChannelDeletion: all
    restrictPrivateChannelDeletion: all
    restrictPrivateChannelManageMembers: all
    enableXToLeaveChannelsFromLHS: false
    userStatusAwayTimeout: 300
    maxChannelsPerTeam: 2000
    maxNotificationsPerChannel: 1000
    enableConfirmNotificationsToChannel: true
    teammateNameDisplay: username
    experimentalViewArchivedChannels: false
    experimentalEnableAutomaticReplies: false
    experimentalHideTownSquareinLHS: false
    experimentalTownSquareIsReadOnly: false
    experimentalPrimaryTeam: ''
    experimentalDefaultChannels: []
  sqlSettings:
    driverName: postgres
    dataSource: ''
    dataSourceReplicas: []
    dataSourceSearchReplicas: []
    maxIdleConns: 20
    connMaxLifetimeMilliseconds: 3600000
    maxOpenConns: 300
    trace: false
    atRestEncryptKey: ''
    queryTimeout: 30
    disableDatabaseSearch: false
  logSettings:
    enableConsole: true
    consoleLevel: INFO
    consoleJson: true
    enableFile: true
    fileLevel: INFO
    fileJson: true
    fileLocation: ''
    enableWebhookDebugging: true
    enableDiagnostics: true
  fileSettings:
    enableFileAttachments: true
    enableMobileUpload: true
    enableMobileDownload: true
    maxFileSize: 104857600
    driverName: local
    directory: /mattermost/data/
    enablePublicLink: true
    publicLinkSalt: ''
    thumbnailWidth: 120
    thumbnailHeight: 100
    previewWidth: 1920
    previewHeight: 1080
    profileWidth: 128
    profileHeight: 128
    initialFont: nunito-bold.ttf
    amazonS3AccessKeyId: ''
    amazonS3SecretAccessKey: ''
    amazonS3Bucket: ''
    amazonS3Region: ''
    amazonS3Endpoint: ''
    amazonS3SSL: true
    amazonS3SignV2: false
    amazonS3SSE: false
    amazonS3Trace: false
    amazons3:
      bucket: ''
      region: ''
      endpoint: ''
      accessKeyId: ''
      secretAccessKey: ''
  emailSettings:
    enableSignUpWithEmail: true
    enableSignInWithEmail: true
    enableSignInWithUsername: true
    sendEmailNotifications: true
    useChannelInEmailNotifications: true
    requireEmailVerification: true
    feedbackName: ''
    feedbackEmail: admin@noah.local
    replyToAddress: admin@noah.local
    feedbackOrganization: NOAH
    enableSMTPAuth: true
    smtpUsername: ''
    smtpPassword: ''
    smtpServer: ''
    smtpPort: '587'
    smtpServerTimeout: 10
    connectionSecurity: STARTTLS
    sendPushNotifications: true
    pushNotificationServer: https://push.mattermost.com
    pushNotificationContents: full
    enableEmailBatching: false
    emailBatchingBufferSize: 256
    emailBatchingInterval: 30
    enablePreviewModeBanner: true
    enableLoginWithEmail: true
    enableLoginWithUsername: true
  rateLimitSettings:
    enable: true
    perSec: 10
    maxBurst: 100
    memoryStoreSize: 10000
    varyByRemoteAddr: true
    varyByUser: false
    varyByHeader: ''
  privacySettings:
    showEmailAddress: true
    showFullName: true
  supportSettings:
    termsOfServiceLink: https://mattermost.com/terms-of-service/
    privacyPolicyLink: https://mattermost.com/privacy-policy/
    aboutLink: https://about.mattermost.com/default-about/
    helpLink: https://about.mattermost.com/default-help/
    reportAProblemLink: https://about.mattermost.com/default-report-a-problem/
    supportEmail: admin@noah.local
    customTermsOfServiceEnabled: false
    customTermsOfServiceReAcceptancePeriod: 365
    enableAskCommunityLink: true
  announcementSettings:
    enableBanner: false
    bannerText: ''
    bannerColor: '#f2a93b'
    bannerTextColor: '#333333'
    allowBannerDismissal: true
  themeSettings:
    enableThemeSelection: true
    defaultTheme: default
    allowCustomThemes: true
    allowedThemes: []
  gitLabSettings:
    enable: false
    secret: ''
    id: ''
    scope: ''
    authEndpoint: ''
    tokenEndpoint: ''
    userApiEndpoint: ''
  pluginSettings:
    enable: true
    enableUploads: true
    allowInsecureDownloadUrl: false
    enableHealthCheck: true
    directory: ./plugins
    clientDirectory: ./client/plugins
    enableMarketplace: true
    enableRemoteMarketplace: true
    automaticPrepackagedPlugins: true
    requirePluginSignature: false
    marketplaceUrl: https://api.integrations.mattermost.com
    signaturePublicKeyFiles: []
  security:
    enableTLS: false
    tlsCertFile: ''
    tlsKeyFile: ''
    readTimeout: 300
    writeTimeout: 300
    idleTimeout: 60
    connectionSecurity: TLS
    allowInsecureOutgoingConnections: false
    enableMultifactorAuthentication: false
    sessionLengthWebInDays: 30
    sessionLengthMobileInDays: 30
    sessionCacheInMinutes: 10
    websocketSecurePort: 443
    useExperimentalGossip: false
auth:
  secretKey: ''
oidc:
  enabled: true
  provider: Keycloak
  clientId: mattermost
  clientSecret: ''
  existingSecret: ''
  existingSecretKey: oidc-client-secret
  discoveryUrl: https://keycloak.noah.local/realms/noah/.well-known/openid_configuration
  buttonText: Login with Keycloak
  buttonColor: '#145dbf'
ldap:
  enabled: true
  host: samba4.noah.svc.cluster.local
  port: 389
  dn: dc=noah,dc=local
  bindUser: cn=mattermost-service,cn=Users,dc=noah,dc=local
  bindPassword: ''
  existingSecret: ''
  existingSecretKey: ldap-password
  userSearch:
    base: cn=Users,dc=noah,dc=local
    filter: (&(objectClass=user)(sAMAccountName=%v))
    attributes:
      id: sAMAccountName
      username: sAMAccountName
      email: mail
      firstName: givenName
      lastName: sn
      nickname: displayName
      position: title
  groupSearch:
    base: cn=Groups,dc=noah,dc=local
    filter: (&(objectClass=group))
    groupDisplayNameAttribute: cn
    groupIdAttribute: cn
  syncIntervalMinutes: 60
  maxPageSize: 2000
  loginIdAttribute: sAMAccountName
  skipCertificateVerification: false
  connectionTimeout: 10000
  requestTimeout: 10000
service:
  type: ClusterIP
  port: 8065
  metricsPort: 8067
  annotations: {}
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hostname: mattermost.noah.local
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: mattermost-tls
database:
  type: postgresql
  host: ''
  port: 5432
  name: mattermost
  user: mattermost
  password: ''
  existingSecret: ''
  existingSecretPasswordKey: postgresql-password
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 2Gi
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
nodeSelector: {}
tolerations: []
affinity: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsUser: 2000
livenessProbe:
  enabled: true
  httpGet:
    path: /api/v4/system/ping
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  enabled: true
  httpGet:
    path: /api/v4/system/ping
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
startupProbe:
  enabled: true
  httpGet:
    path: /api/v4/system/ping
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 20
persistence:
  data:
    enabled: true
    storageClass: ''
    accessModes:
    - ReadWriteOnce
    size: 20Gi
    annotations: {}
    path: /mattermost/data
  config:
    enabled: true
    storageClass: ''
    accessModes:
    - ReadWriteOnce
    size: 5Gi
    annotations: {}
    path: /mattermost/config
  logs:
    enabled: true
    storageClass: ''
    accessModes:
    - ReadWriteOnce
    size: 10Gi
    annotations: {}
    path: /mattermost/logs
  plugins:
    enabled: true
    storageClass: ''
    accessModes:
    - ReadWriteOnce
    size: 10Gi
    annotations: {}
    path: /mattermost/plugins
postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    username: mattermost
    password: mattermost
    database: mattermost
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1000m
redis:
  enabled: true
  auth:
    enabled: true
    password: mattermost
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
elasticsearch:
  enabled: false
  clusterName: mattermost-elasticsearch
  nodeGroup: master
  masterService: mattermost-elasticsearch
  roles:
    master: 'true'
    ingest: 'true'
    data: 'true'
  replicas: 1
  minimumMasterNodes: 1
  esMajorVersion: ''
  esConfig:
    elasticsearch.yml: 'cluster.name: "mattermost-elasticsearch"

      network.host: 0.0.0.0

      discovery.type: single-node

      xpack.security.enabled: false

      '
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  volumeClaimTemplate:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 30Gi
metrics:
