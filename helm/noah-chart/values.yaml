# NOAH Platform - Main Chart Values
# This file contains the default configuration values for the NOAH platform

# Enable/disable noah-chart deployment
noahChart:
  enabled: true

# Global configuration
global:
  # Domain configuration
  domain: "noah.local"
  
  # Storage class for persistent volumes
  storageClass: "default"
  
  # Image pull secrets (if using private registries)
  imagePullSecrets: []
  
  # Common labels applied to all resources
  labels:
    app.kubernetes.io/part-of: noah-platform
    app.kubernetes.io/managed-by: helm
  
  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

# Simple placeholder values for core applications
# Individual charts will be deployed separately via Ansible

# PostgreSQL configuration (for reference)
postgresql:
  enabled: false
  host: "postgresql"
  port: 5432
  database: "noah"
  username: "noah"

# Keycloak configuration
keycloak:
  enabled: true
  replicaCount: 1
  
  image:
    repository: quay.io/keycloak/keycloak
    tag: "22.0"
    pullPolicy: IfNotPresent
  
  port: 8080
  
  args:
    - start-dev
    - --http-enabled=true
    - --http-host=0.0.0.0
    - --http-port=8080
    - --hostname-strict=false
    - --hostname-strict-https=false
  
  env:
    KEYCLOAK_ADMIN: admin
    KEYCLOAK_ADMIN_PASSWORD: admin
    KC_PROXY: edge
    KC_HOSTNAME_STRICT: "false"
    KC_HOSTNAME_STRICT_HTTPS: "false"
    KC_HTTP_ENABLED: "true"
  
  service:
    type: ClusterIP
    port: 8080
  
  readinessProbe:
    path: /
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
  
  livenessProbe:
    path: /
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  realmConfig:
    realm: noah
    enabled: true
    sslRequired: none
    displayName: "NOAH Realm"
    registrationAllowed: true
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false

# OAuth2 Proxy configuration
oauth2proxy:
  enabled: true
  replicaCount: 1
  
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.5.0"
    pullPolicy: IfNotPresent
  
  port: 4180
  
  # OAuth2 Provider settings
  provider: oidc
  clientId: oauth2-proxy
  emailDomain: "*"
  
  # OIDC settings
  oidc:
    issuerUrl: http://noah-noah-chart-keycloak.noah-namespace.svc.cluster.local:8080/realms/noah
  
  # Upstream application
  upstream: http://noah-app-service:5000/
  
  # Security settings
  cookieSecure: false
  skipProviderButton: true
  insecureOidc: true
  sslInsecure: true
  skipOidcDiscovery: false
  
  # URLs
  redirectUrl: http://localhost:4180/oauth2/callback
  
  service:
    type: ClusterIP
    port: 4180
  
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi

# Keycloak configuration (for reference)
keycloak_legacy:
  enabled: false
  hostname: "keycloak.noah.local"

# GitLab configuration (for reference)
gitlab:
  enabled: false
  hostname: "gitlab.noah.local"

# Nextcloud configuration (for reference)
nextcloud:
  enabled: false
  hostname: "nextcloud.noah.local"

# Mattermost configuration (for reference)
mattermost:
  enabled: false
  hostname: "mattermost.noah.local"

# Grafana configuration (for reference)
grafana:
  enabled: false
  hostname: "grafana.noah.local"

# Prometheus configuration (for reference)
prometheus:
  enabled: false
  hostname: "prometheus.noah.local"

# Network policies
networkPolicies:
  enabled: true
  
# Resource quotas
resourceQuotas:
  enabled: true
  
# Pod security policies
podSecurityPolicies:
  enabled: true

# Backup configuration
backup:
  enabled: false
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: "30d"       # Keep backups for 30 days
# Service configuration
service:
  enabled: true
  type: ClusterIP
  port: 80

# Ingress configuration  
ingress:
  enabled: false
  annotations: {}
  hosts: []
  tls: []

# Persistence configuration
persistence:
  enabled: false
  size: 10Gi
  storageClass: ""

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Service Monitor for Prometheus
serviceMonitor:
  enabled: false

# Network Policy
networkPolicy:
  enabled: false

