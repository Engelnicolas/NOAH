{{- if .Values.oauth2proxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oauth2-proxy.fullname" . }}-simple
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ include "oauth2-proxy.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "oauth2-proxy.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "oauth2-proxy.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "oauth2-proxy.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: oauth2-proxy
          image: "quay.io/oauth2-proxy/oauth2-proxy:v7.6.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          args:
            - "--provider=oidc"
            - "--oidc-issuer-url=https://keycloak.noah.local/realms/noah"
            - "--client-id=oauth2-proxy"
            - "--email-domain=*"
            - "--upstream=static://202"
            - "--http-address=0.0.0.0:4180"
            - "--metrics-address=0.0.0.0:44180"
            - "--cookie-name=_oauth2_proxy"
            - "--cookie-domain=.noah.local"
            - "--cookie-expire=168h"
            - "--cookie-refresh=1h"
            - "--cookie-httponly=true"
            - "--cookie-samesite=lax"
            - "--session-store-type=redis"
            - "--redis-connection-url=redis://oauth2-proxy-redis-master:6379/0"
            - "--scope=openid profile email groups"
            - "--skip-auth-regex=^/oauth2/"
            - "--skip-auth-regex=^/ping$"
            - "--skip-auth-regex=^/health$"
            - "--pass-authorization-header=true"
            - "--pass-access-token=true"
            - "--pass-user-headers=true"
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "oauth2-proxy.fullname" . }}-oauth2
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "oauth2-proxy.fullname" . }}-cookie
                  key: cookie-secret
            - name: OAUTH2_PROXY_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-redis
                  key: redis-password
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
            - name: metrics
              containerPort: 44180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
