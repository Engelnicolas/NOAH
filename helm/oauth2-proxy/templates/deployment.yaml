{{- if .Values.oauth2proxy.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oauth2-proxy.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "oauth2-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "oauth2-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oauth2-proxy.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "oauth2-proxy.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: oauth2-proxy
          image: "quay.io/oauth2-proxy/oauth2-proxy:v7.6.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
          args:
            - "--provider={{ .Values.config.provider | default "oidc" }}"
            {{- if .Values.config.oidcIssuerUrl }}
            - "--oidc-issuer-url={{ .Values.config.oidcIssuerUrl }}"
            {{- end }}
            - "--client-id={{ .Values.config.clientId | default "oauth2-proxy" }}"
            - "--email-domain=*"
            {{- if .Values.config.upstreams }}
            {{- range .Values.config.upstreams }}
            - "--upstream={{ . }}"
            {{- end }}
            {{- end }}
            - "--http-address=0.0.0.0:4180"
            {{- if .Values.config.metricsAddress }}
            - "--metrics-address={{ .Values.config.metricsAddress }}"
            {{- end }}
            - "--cookie-name={{ .Values.config.cookieName | default "_oauth2_proxy" }}"
            {{- if .Values.config.cookieDomain }}
            - "--cookie-domain={{ .Values.config.cookieDomain }}"
            {{- end }}
            - "--cookie-expire={{ .Values.config.cookieExpire | default "168h" }}"
            - "--cookie-refresh={{ .Values.config.cookieRefresh | default "1h" }}"
            - "--cookie-httponly={{ .Values.config.cookieHttpOnly | default true }}"
            - "--cookie-secure={{ .Values.config.cookieSecure | default true }}"
            - "--cookie-samesite={{ .Values.config.cookieSameSite | default "lax" }}"
            {{- if eq .Values.sessionStorage.type "redis" }}
            - "--session-store-type=redis"
            - "--redis-connection-url={{ .Values.sessionStorage.redis.connectionUrl }}"
            {{- end }}
            - "--scope=openid profile email"
            - "--skip-auth-regex=^/oauth2/"
            - "--skip-auth-regex=^/ping$"
            - "--skip-auth-regex=^/health$"
            - "--pass-authorization-header=true"
            - "--pass-access-token=true"
            - "--pass-user-headers=true"
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "oauth2-proxy.fullname" . }}-oauth2
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "oauth2-proxy.fullname" . }}-cookie
                  key: cookie-secret
            {{- if .Values.sessionStorage.redis.password }}
            - name: OAUTH2_PROXY_REDIS_PASSWORD
              value: "{{ .Values.sessionStorage.redis.password }}"
            {{- end }}
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
            - name: metrics
              containerPort: 44180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
{{- end }}
