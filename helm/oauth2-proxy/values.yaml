# Global configuration

global:
  imageRegistry: ''
  imagePullSecrets: []
  storageClass: ''
replicaCount: 2
image:
  registry: quay.io
  repository: oauth2-proxy/oauth2-proxy
  tag: v7.6.0
  pullPolicy: IfNotPresent
  pullSecrets: []
service:
  type: ClusterIP
  port: 4180
  annotations: {}
  sessionAffinity: ClientIP
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
  - host: oauth2-proxy.noah.local
    paths:
    - path: /oauth2
      pathType: Prefix
  tls:
    enabled: true
    secretName: oauth2-proxy-tls
oauth2:
  provider: oidc
  oidcIssuerUrl: https://keycloak.noah.local/realms/noah
  oidcPort: 443
  clientId: oauth2-proxy
  clientSecret: ''
  existingSecret: ''
  existingSecretKey: client-secret
  cookieSecret: ''
  cookieSecretExistingSecret: ''
  cookieSecretExistingSecretKey: cookie-secret
  cookieName: _oauth2_proxy
  cookieDomain: .noah.local
  cookieExpire: 168h
  cookieRefresh: 1h
  cookieSecure: true
  cookieHttpOnly: true
  cookieSameSite: lax
  sessionStorageType: redis
  emailDomains:
  - '*'
  scope: openid profile email groups
  upstreams:
  - static://202
  skipAuthRegex:
  - ^/oauth2/
  - ^/ping$
  - ^/health$
  passAuthorizationHeader: true
  passAccessToken: true
  passUserHeaders: true
config:
  metricsAddress: 0.0.0.0:44180
sessionStorage:
  type: redis
  redis:
    connectionUrl: redis://oauth2-proxy-redis-master:6379
  setAuthorizationHeader: true
  setXAuthRequestHeaders: true
  requestLogging: true
  standardLogging: true
  authLogging: true
  forceHttps: true
  insecureOidcAllowUnverifiedEmail: false
  insecureOidcSkipIssuerVerification: false
  skipJwtBearerTokens: false
  flushInterval: 1s
  extraArgs: []
  extraEnv: []
redis:
  enabled: true
  auth:
    enabled: true
    password: oauth2proxy
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m
externalRedis:
  host: ''
  port: 6379
  password: ''
  existingSecret: ''
  existingSecretPasswordKey: redis-password
  database: 0
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDown:
    stabilizationWindowSeconds: 300
    percentPolicy: 50
    periodSeconds: 15
  scaleUp:
    stabilizationWindowSeconds: 0
    percentPolicy: 100
    periodSeconds: 15
podDisruptionBudget:
  enabled: true
  minAvailable: 1
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: oauth2-proxy
        topologyKey: kubernetes.io/hostname
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  fsGroup: 2000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 2000
livenessProbe:
  enabled: true
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  enabled: true
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
startupProbe:
  enabled: true
  httpGet:
    path: /ping
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
serviceAccount:
  create: true
  annotations: {}
  name: ''
networkPolicy:
  enabled: true
  ingress:
    enabled: true
  egress:
    enabled: true
  monitoring:
    namespace: monitoring
metrics:
  enabled: true
  port: 44180
  serviceMonitor:
    enabled: true
    namespace: ''
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
podAnnotations:
  prometheus.io/scrape: 'true'
  prometheus.io/port: '44180'
  prometheus.io/path: /metrics
podLabels: {}
commonLabels: {}
commonAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
initContainers: []
sidecarContainers: []
persistence:
  enabled: false
  storageClass: ''
  accessModes:
  - ReadWriteOnce
  size: 1Gi
  annotations: {}
  selector: {}
