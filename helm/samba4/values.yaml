# Enable/disable samba4 deployment
samba4:
  enabled: true

global:
  imageRegistry: ''
  imagePullSecrets: []
  storageClass: ''
replicaCount: 1
image:
  registry: ''
  repository: dperson/samba
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []
domain:
  name: NOAH
  realm: NOAH.LOCAL
  dnsForwarder: 8.8.8.8
  adminPassword: Admin123!
  existingSecret: ''
  existingSecretKey: admin-password
  organizationalUnits:
  - Users
  - Groups
  - Computers
  - Service-Accounts
  groups:
  - name: Domain Admins
    description: Domain Administrators
  - name: Keycloak-Admins
    description: Keycloak Administrators
  - name: GitLab-Admins
    description: GitLab Administrators
  - name: Grafana-Admins
    description: Grafana Administrators
  - name: Nextcloud-Users
    description: Nextcloud Users
  - name: Mattermost-Users
    description: Mattermost Users
  serviceAccounts:
  - username: keycloak-service
    password: ''
    groups:
    - Domain Users
  - username: gitlab-service
    password: ''
    groups:
    - Domain Users
  - username: grafana-service
    password: ''
    groups:
    - Domain Users
  - username: nextcloud-service
    password: ''
    groups:
    - Domain Users
  - username: mattermost-service
    password: ''
    groups:
    - Domain Users
service:
  type: ClusterIP
  annotations: {}
  ports:
    ldap: 389
    ldaps: 636
    kerberos: 88
    kadmin: 464
    dns: 53
    smb: 445
  ldap:
    port: 389
  ldaps:
    port: 636
  kerberos:
    port: 88
    kadmin:
      port: 464
  dns:
    port: 53
  smb:
    enabled: false
    port: 445
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hostname: samba4.noah.local
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: samba4-tls
persistence:
  enabled: true
  storageClass: ''
  accessModes:
  - ReadWriteOnce
  size: 20Gi
  annotations: {}
  volumes:
    data:
      size: 10Gi
      path: /var/lib/samba
    sysvol:
      size: 5Gi
      path: /var/lib/samba/sysvol
    logs:
      size: 5Gi
      path: /var/log/samba
resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi
nodeSelector: {}
tolerations: []
affinity: {}
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0
securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    add:
    - NET_ADMIN
    - NET_BIND_SERVICE
    - SYS_ADMIN
    - DAC_OVERRIDE
    - CHOWN
    - FOWNER
    - SETGID
    - SETUID
  readOnlyRootFilesystem: false
  runAsUser: 0
livenessProbe:
  enabled: true
  tcpSocket:
    port: ldap
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  enabled: true
  tcpSocket:
    port: ldap
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
startupProbe:
  enabled: true
  tcpSocket:
    port: ldap
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
networkPolicy:
  enabled: true
  ingress:
    enabled: true
    allowedNamespaces:
    - default
    - kube-system
    allowedPorts:
    - 389
    - 636
    - 88
    - 464
    - 53
  egress:
    enabled: true
dns:
  enabled: true
  forwarders:
  - 8.8.8.8
  - 1.1.1.1
  customRecords: []
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
sambaConfig: "[global]\n    netbios name = {{ upper .Values.domain.name }}\n    realm = {{ upper .Values.domain.realm }}\n\
  \    domain master = yes\n    domain logons = yes\n    preferred master = yes\n    os level = 255\n    wins support = yes\n\
  \    dns forwarder = {{ .Values.domain.dnsForwarder }}\n    server role = active directory domain controller\n    workgroup\
  \ = {{ upper .Values.domain.name }}\n\n    # Security settings\n    server min protocol = SMB2_10\n    client min protocol\
  \ = SMB2_10\n    ntlm auth = mschapv2-and-ntlmv2-only\n\n    # Logging\n    log level = 1\n    log file = /var/log/samba/log.%m\n\
  \    max log size = 1000\n\n    # Performance\n    socket options = >-\n      TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=131072\
  \ SO_SNDBUF=131072\n    deadtime = 30\n    getwd cache = yes\n\n    # DNS\n    allow dns updates = secure only\n    dns\
  \ update command = /usr/bin/samba-tool dns update\n\n[sysvol]\n    path = /var/lib/samba/sysvol\n    read only = no\n\n\
  [netlogon]\n    path = /var/lib/samba/sysvol/{{ lower .Values.domain.realm }}/scripts\n    read only = no\n"
extraEnvVars:
- name: DOMAIN
  value: '{{ .Values.domain.realm }}'
- name: DOMAINPASS
  valueFrom:
    secretKeyRef:
      name: '{{ include "samba4.secretName" . }}'
      key: '{{ .Values.domain.existingSecretKey }}'
- name: DNSFORWARDER
  value: '{{ .Values.domain.dnsForwarder }}'
- name: HOSTIP
  valueFrom:
    fieldRef:
      fieldPath: status.podIP
extraVolumes: []
extraVolumeMounts: []
initContainers: []
podAnnotations: {}
podLabels: {}
commonLabels: {}
commonAnnotations: {}
rbac:
  create: true
podDisruptionBudget:
  enabled: false
  minAvailable: 1
replication:
  enabled: false
  readOnlyDomainControllers: []
samba:
  workgroup: NOAH
  realm: NOAH.LOCAL
  netbiosName: NOAH-DC
  serverRole: active directory domain controller
  dnsForwarder: 8.8.8.8
  logLevel: 1
  maxLogSize: 1000
  minProtocol: SMB2_10
  maxProtocol: SMB3
  clientMinProtocol: SMB2_10
  clientMaxProtocol: SMB3
  tls:
    enabled: false
    keyFile: /etc/ssl/private/samba.key
    certFile: /etc/ssl/certs/samba.crt
    caFile: /etc/ssl/certs/ca.crt
  ldap:
    requireStrongAuth: 'yes'
  socketOptions: TCP_NODELAY IPTOS_LOWDELAY SO_RCVBUF=131072 SO_SNDBUF=131072
  readRaw: 'yes'
  writeRaw: 'yes'
  maxXmit: 65536
  loadPrinters: 'no'
  printing: bsd
  disableSpoolss: 'yes'
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
backup:
  enabled: true
  schedule: 0 2 * * *
  retention: 7d
  image:
    registry: ''
    repository: alpine
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ''
    accessModes:
    - ReadWriteOnce
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  s3:
    enabled: false
    bucket: ''
    region: ''
    accessKey: ''
    secretKey: ''
kerberos:
  dnsLookupRealm: 'true'
  dnsLookupKdc: 'true'
  ticketLifetime: 24h
  renewLifetime: 7d
  forwardable: 'true'
  extraConfig: {}
serviceAccount:
  create: true
  annotations: {}
  name: ''
  automount: true
serviceMonitor:
  enabled: false
  namespace: ''
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  endpoints:
  - port: metrics
    path: /metrics
