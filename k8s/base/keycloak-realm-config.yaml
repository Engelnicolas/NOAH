apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: noah-namespace
data:
  noah-realm.json: |
    {
      "realm": "noah",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": true,
      "clients": [
        {
          "clientId": "oauth2-proxy",
          "enabled": true,
          "publicClient": false,
          "secret": "your-client-secret-here",
          "redirectUris": [
            "http://localhost:4180/oauth2/callback",
            "http://oauth2-proxy.noah-namespace.svc.cluster.local:4180/oauth2/callback",
            "http://oauth2-proxy:4180/oauth2/callback",
            "http://*/oauth2/callback"
          ],
          "webOrigins": ["*"],
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "protocol": "openid-connect"
        }
      ],
      "users": [
        {
          "username": "testuser",
          "enabled": true,
          "email": "test@example.com",
          "firstName": "Test",
          "lastName": "User",
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["user"]
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "user",
            "description": "Regular user role"
          },
          {
            "name": "admin",
            "description": "Admin role"
          }
        ]
      }
    }
