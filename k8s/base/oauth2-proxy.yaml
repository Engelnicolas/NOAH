apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: noah-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.0
        args:
        - --provider=oidc
        - --oidc-issuer-url=http://keycloak.noah-namespace.svc.cluster.local:8080/realms/noah
        - --client-id=oauth2-proxy
        - --email-domain=*
        - --upstream=http://noah-app-service:5000/
        - --http-address=0.0.0.0:4180
        - --cookie-secure=false
        - --redirect-url=http://localhost:4180/oauth2/callback
        - --skip-provider-button=true
        - --insecure-oidc-allow-unverified-email=true
        - --ssl-insecure-skip-verify=true
        - --skip-oidc-discovery=false
        env:
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-secrets
              key: client-secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-secrets
              key: cookie-secret