# =======================================
# NOAH Minimal Installation Values
# =======================================
# Lightweight configuration for testing and development
# Version: 2.0.0
# Updated: July 16, 2025

# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================

# Single replica for minimal resource usage

replicaCount: 1
image:
  pullPolicy: IfNotPresent
  tag: latest
securityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: true
  capabilities:
    drop:
    - ALL
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
persistence:
  enabled: false
  size: 1Gi
  storageClass: ''
  accessMode: ReadWriteOnce
postgresql:
  enabled: false
redis:
  enabled: false
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts: []
  tls: []
networkPolicy:
  enabled: false
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
env:
- name: ENVIRONMENT
  value: minimal
- name: DEBUG
  value: 'false'
- name: LOG_LEVEL
  value: info
global:
  storageClass: ''
  domain: localhost
  environment: development
  timezone: UTC
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
nodeSelector: {}
tolerations: []
affinity: {}
labels:
  app: noah-minimal
  tier: development
  profile: minimal
annotations:
  description: Minimal NOAH deployment for testing
  version: 2.0.0
  profile: minimal
  maintainer: NOAH Team
