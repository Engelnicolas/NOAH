# =======================================
# NOAH Root User Deployment Values
# =======================================
# Configuration for deployments requiring root privileges
# Version: 2.0.0
# Updated: July 16, 2025

# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================

# Single replica for development/testing

replicaCount: 1
image:
  pullPolicy: Always
  tag: latest
securityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: true
  capabilities:
    add:
    - SYS_ADMIN
    - NET_ADMIN
    - DAC_OVERRIDE
    drop:
    - ALL
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi
persistence:
  enabled: true
  size: 20Gi
  storageClass: standard
  accessMode: ReadWriteOnce
  annotations: {}
postgresql:
  enabled: true
  auth:
    username: noah
    database: noah
    password: noahSecure123!
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    securityContext:
      enabled: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
redis:
  enabled: true
  auth:
    enabled: true
    password: redisSecure123!
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    securityContext:
      enabled: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}
ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '60'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '60'
  hosts:
  - host: app.noah.local
    paths:
    - path: /
      pathType: Prefix
  tls: []
networkPolicy:
  enabled: false
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    app: noah-root
  path: /metrics
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
env:
- name: ENVIRONMENT
  value: development
- name: DEBUG
  value: 'true'
- name: LOG_LEVEL
  value: debug
- name: ROOT_USER
  value: 'true'
- name: SECURITY_PROFILE
  value: root
global:
  storageClass: standard
  domain: noah.local
  environment: development
  timezone: UTC
  securityProfile: root
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
nodeSelector: {}
tolerations:
- key: node-role.kubernetes.io/master
  operator: Exists
  effect: NoSchedule
affinity: {}
labels:
  app: noah-root
  tier: development
  profile: root
  security: privileged
annotations:
  description: NOAH deployment with root privileges
  version: 2.0.0
  profile: root
  security: privileged
  maintainer: NOAH Team
backup:
  enabled: false
  schedule: 0 2 * * *
  retention: 7
  storage:
    size: 10Gi
samba4:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
keycloak:
  replicaCount: 1
  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: 22.0.5
  resources:
    requests:
      memory: 512Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 500m
  autoscaling:
    enabled: false
  auth:
    adminPassword: admin123!
  production:
    enabled: false
  database:
    vendor: postgres
    hostname: keycloak-postgresql
    database: keycloak
    username: keycloak
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 1000
oauth2-proxy:
  replicaCount: 1
  config:
    clientSecret: oauth2-secret-123!
    cookieSecret: cookiesecret1234567890abcdef12
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 2000
    runAsGroup: 2000
    fsGroup: 2000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    runAsNonRoot: true
    runAsUser: 2000
    runAsGroup: 2000
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
